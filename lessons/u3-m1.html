 beats:[
  {t:'read',kicker:'The definition',title:'One, meaning His alone',
   html:'<p><span class="term" data-term="tawhid">Tawḥīd</span> means declaring Allah to be one. But “one” here is not just a number. It means exclusivity. Whatever is uniquely His, of divinity, of Lordship, of the most beautiful names and attributes, belongs to Him alone, and no one shares in it, however high their status. Not a close angel. Not a beloved prophet.</p><p>That is a line nothing created can cross.</p>',

  {t:'read',kicker:'A fair objection',title:'“Isn’t Tawhid an invented word?”',
