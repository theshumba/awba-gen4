 terms:{

  'nur-24-51':{ref:'an-Nūr 24:51',ar:'إِنَّمَا كَانَ قَوْلَ ٱلْمُؤْمِنِينَ إِذَا دُعُوٓا۟ إِلَى ٱللَّهِ وَرَسُولِهِۦ لِيَحْكُمَ بَيْنَهُمْ أَن يَقُولُوا۟ سَمِعْنَا وَأَطَعْنَا',mean:'The only response of the ˹true˺ believers, when they are called to Allah and His Messenger so he may judge between them, is to say, "We hear and obey." It is they who will ˹truly˺ succeed.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'isra-17-36':{ref:'al-Isrāʾ 17:36',ar:'وَلَا تَقْفُ مَا لَيْسَ لَكَ بِهِۦ عِلْمٌ ۚ إِنَّ ٱلسَّمْعَ وَٱلْبَصَرَ وَٱلْفُؤَادَ كُلُّ أُو۟لَـٰٓئِكَ كَانَ عَنْهُ مَسْـُٔولًا',mean:'Do not follow what you have no ˹sure˺ knowledge of. Indeed, all will be called to account for ˹their˺ hearing, sight, and intellect.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'baqarah-2-137':{ref:'al-Baqarah 2:137',ar:'فَإِنْ ءَامَنُوا۟ بِمِثْلِ مَآ ءَامَنتُم بِهِۦ فَقَدِ ٱهْتَدَوا۟',mean:'So if they believe in what you believe, then they will indeed be ˹rightly˺ guided.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'yusuf-12-2':{ref:'Yūsuf 12:2',ar:'إِنَّآ أَنزَلْنَـٰهُ قُرْءَٰنًا عَرَبِيًّا لَّعَلَّكُمْ تَعْقِلُونَ',mean:'Indeed, We have sent it down as an Arabic Quran so that you may understand.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'}
 },
 beats:[
  {t:'panel',variant:'check',title:'The five checks',intro:'The principles used to check whether a belief is sound.',
   items:[
    {name:'Submit to all of it',body:'Believe in and follow every text of the Qur’an and Sunnah, rather than keeping the parts you like. '+AW.cite('nur-24-51','an-Nūr 24:51')},
    {name:'Read the texts together',body:'Gather all the texts on a question and understand them as one, instead of seizing a single line in isolation.'},
    {name:'From revelation alone',body:'Affirm what the texts affirm, deny what they deny, stay silent where they are silent. No dream, feeling, or private claim adds an article of belief. '+AW.cite('isra-17-36','al-Isrāʾ 17:36')},
    {name:'As the first community understood them',body:'Read the texts the way the <span class="term" data-term="sahabah">ṣaḥābah</span> who received them did, not reinvented each era to fit the mood of the age. '+AW.cite('baqarah-2-137','al-Baqarah 2:137')},
    {name:'Through their own language',body:'Return to the Arabic the Qur’an was revealed in to reach the intended meaning. '+AW.cite('yusuf-12-2','Yūsuf 12:2')}],

  {t:'depth',point:'Sound belief is the one you check against the texts, not the one you bend the texts to fit.',
   lenses:{reality:'If you only keep the evidence that already suits you, your belief becomes a mirror of what you wanted to be true. Letting the evidence correct you is the only way to end up with the truth instead of your own reflection.',
   revelation:'The believers are described by a single response when called to the revelation. We hear and obey. '+AW.cite('nur-24-51','an-Nūr 24:51'),
   ruling:'Where the texts have spoken clearly, there is no picking and choosing.'}},
  {t:'reflect',prompt:'What changes when you let the evidence correct you, instead of keeping only the evidence that fits what you hoped was true?',
   model:'It is a quiet shift, but a big one. Belief stops being a mirror of your preferences and becomes something you can actually trust, because it rests on more than your own wishes.'},
  {t:'mc',q:'A friend says a belief must be true, because a pious teacher saw it confirmed in a dream. Run it through the method. Sound basis for creed?',

   good:'However sincere the person, a dream or private experience is not a source of creed. That is the third check at work.',

  {t:'mc',q:'Someone builds a whole belief on a single verse read alone, brushing aside the verses that qualify it. Sound method?',

   good:'A true statement, quoted alone, can still mislead. The method reads every relevant text as one. That is the second check.',

 doneTitle:'The foundation is complete',
 doneLine:'What belief is, why it matters, where it comes from, how it stays sound. Time to prove it, in gold.',
