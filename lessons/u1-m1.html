 beats:[
  {t:'read',kicker:'The word itself',title:'Belief you can build on',
   html:'<p>The Arabic word for creed is <span class="term" data-term="aqeedah">ʿaqīdah</span>. It comes from a root that means to tie, or to bind something firmly in place, the way you would fasten a knot you trust to hold.</p><p>That picture says a lot. Sound belief is not a passing mood or a loose opinion. It is a settled certainty your heart is fastened to, with no real doubt left in it. It covers what you believe about God, and about everything He has told us that we could never work out on our own.</p>',
   marker:{type:'angle',body:'A loose opinion drifts with the weather. A knot tied well holds through the storm. That steadier kind of belief is what this word points to.'}},
  {t:'depth',point:'Sound belief is certainty, not a loose opinion.',

   ruling:'Creed is meant to be held as firm conviction, not a probable guess. And “sound” means free of fault. The goal is to hold the right thing, and to hold it with certainty.'}},
  {t:'reflect',prompt:'Where in your life does being <em>certain</em> of something change how you act, compared with only assuming it?',

   marker:{type:'remember',body:'Tawḥīd, usul ad-deen, īmān. Different names, one core.'}},

   gentle:'Tawḥīd, usul ad-deen, and īmān are all names for creed. The rules of buying and selling are the odd one out.'},

    {name:'Built on evidence',body:'It asks you to believe for reasons, never blindly. God describes the clearest, most conclusive proof as His. '+AW.cite('anam-6-149','al-Anʿām 6:149')},
