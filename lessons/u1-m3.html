  {t:'read',kicker:'The starting point',title:'Something already in you',
   html:'<p>Long before anyone teaches you a single thing, something in you already leans toward your Maker. Islam calls that leaning the <span class="term" data-term="fitrah">fiṭrah</span>.</p><p>You can watch it surface in hard moments. When the plane drops or the news turns bad, people who never pray find themselves reaching for something greater, almost without deciding to. The Prophet, peace be upon him, described this: every child is born upon that natural state, and it is upbringing that shapes them one way or another. '+AW.cite('bukhari-fitrah','Ṣaḥīḥ al-Bukhārī 1385')+'</p>',
