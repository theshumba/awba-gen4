  'zumar-39-65':{ref:'az-Zumar 39:65',ar:'وَلَقَدْ أُوحِىَ إِلَيْكَ وَإِلَى ٱلَّذِينَ مِن قَبْلِكَ لَئِنْ أَشْرَكْتَ لَيَحْبَطَنَّ عَمَلُكَ وَلَتَكُونَنَّ مِنَ ٱلْخَـٰسِرِينَ',mean:'It has already been revealed to you—and to those ˹prophets˺ before you—that if you associate others ˹with Allah˺, your deeds will certainly be void and you will truly be one of the losers.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},

 beats:[
  {t:'read',kicker:'A small story',title:'Two lamps in a window',
   html:'<p class="story-lead">Picture two lamps set in two windows on the same quiet street. At dusk they look the same. Both are bright, both are lovely, both catch the eye of everyone who passes.</p><p>But one has a deep reserve of oil beneath its flame. The other is running on the last of its fumes. For an hour, you could not tell them apart. Then the night grows long. One lamp holds its steady light until morning. The other flickers, gutters, and goes dark, however beautiful it looked at dusk.</p><p>The light everyone admires is the good that you do. The oil no one sees is what you believe underneath it.</p>',
   marker:{type:'angle',body:'Two people can do the very same good thing. What keeps it burning, or lets it go out, is the belief beneath it.'}},
  {t:'verse',kicker:'Both halves in one line',label:'From the Qur’an · al-Kahf 18:110',
   ar:'قُلْ إِنَّمَآ أَنَا۠ بَشَرٌ مِّثْلُكُمْ يُوحَىٰٓ إِلَىَّ أَنَّمَآ إِلَـٰهُكُمْ إِلَـٰهٌ وَٰحِدٌ ۖ فَمَن كَانَ يَرْجُوا۟ لِقَآءَ رَبِّهِۦ فَلْيَعْمَلْ عَمَلًا صَـٰلِحًا وَلَا يُشْرِكْ بِعِبَادَةِ رَبِّهِۦٓ أَحَدًۢا',
   tr:'Say, ˹O Prophet,˺ "I am only a man like you, ˹but˺ it has been revealed to me that your God is only One God. So whoever hopes for the meeting with their Lord, let them do good deeds and associate none in the worship of their Lord."'},
  {t:'read',kicker:'A common thought',title:'“Surely good is good, whatever you believe?”',
   html:'<p>It is a fair thought, and the kindness is real. Islam never pretends it is not. It only says that every deed rests on a foundation. A gift given to be admired by the crowd, or an act built on turning away from God, loses its footing, the way a room built out over open air has nothing to hold it up.</p><p>The deed does not vanish because it was worthless. It falls because there was nothing underneath to carry it.</p>',
   marker:{type:'remember',body:'The Qur’an warns that setting up a partner with God can leave even a lifetime of work weightless. '+AW.cite('zumar-39-65','az-Zumar 39:65')}},
  {t:'read',kicker:'One message, many messengers',title:'The sentence that never changed',
   html:'<p>Nuh, then Ibrahim, then Musa, then Isa, and finally Muhammad, peace be upon them all. Different peoples, different centuries, different languages. Yet every single one opened with the same sentence. Worship God alone, and turn away from every <span class="term" data-term="taghut">ṭāghūt</span>.</p><p>When the very same first lesson is taught by every teacher across every age, that is how you know it is the essential one. '+AW.cite('nahl-16-36','an-Naḥl 16:36')+' '+AW.cite('anbiya-21-25','al-Anbiyāʾ 21:25')+'</p>'},
  {t:'reflect',prompt:'Three questions follow everyone who has ever lived. Where did I come from, why am I here, where am I going? Which one sits with you most right now?',
   model:'Most people find one of the three pressing harder than the others. Naming which one is loud for you matters, because sound belief speaks to all three. It tells you Whose you are, what you are here for, and where the road leads.'},
  {t:'mc',q:'Two people give the very same gift on the same day. One gives hoping the room will admire them. The other gives quietly, wanting only God’s pleasure. What most changes the weight of the deed?',
   o:['The size of the gift','The belief and intention beneath it','How many people saw it'],c:1,
   good:'From the outside the acts look identical. Islam weighs the belief and intention underneath, which is exactly why sound belief is never separate from the good we do.',
   gentle:'Think back to the two lamps. The crowd and the clock do not decide its worth. What changes everything is the belief and intention beneath the act.'},
