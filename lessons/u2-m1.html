 opener:{h2:'You built the foundation',p:'Now we guard it. Sound belief rarely collapses in one dramatic moment. It drifts, quietly, and the first pull often comes from inside.',
  thought:'Deviation almost never announces itself. It feels reasonable, familiar, even sincere. That is exactly why the causes worth knowing best are the quiet ones.'},
 terms:{
  jahiliyyah:{ar:'جَاهِلِيَّة',tl:'jāhiliyyah',word:'pre-Islamic ignorance',def:'A state of not knowing sound guidance, the condition before the message came.',ctx:'Umar warned that the bonds of Islam come undone one by one when a generation grows up not recognising what jāhiliyyah was.'},
  taqlid:{ar:'تَقْلِيد',tl:'taqlīd',word:'following without proof',def:'Accepting a belief on someone’s say-so, without any evidence.',ctx:'Following a qualified scholar is normal. It turns blameworthy when it switches off your need for proof and follows a person against the evidence.'}
 },
 refs:{
  'jathiya-45-23':{ref:'al-Jāthiyah 45:23',ar:'أَفَرَءَيْتَ مَنِ ٱتَّخَذَ إِلَـٰهَهُۥ هَوَىٰهُ وَأَضَلَّهُ ٱللَّهُ عَلَىٰ عِلْمٍ',mean:'Have you seen ˹O Prophet˺ those who have taken their own desires as their god? ˹And so˺ Allah left them to stray knowingly.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'zukhruf-43-22':{ref:'az-Zukhruf 43:22',ar:'بَلْ قَالُوٓا۟ إِنَّا وَجَدْنَآ ءَابَآءَنَا عَلَىٰٓ أُمَّةٍ وَإِنَّا عَلَىٰٓ ءَاثَـٰرِهِم مُّهْتَدُونَ',mean:'In fact, they say, "We found our forefathers following a ˹particular˺ way, and we are following in their footsteps."',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'araf-7-179':{ref:'al-Aʿraf 7:179',ar:'لَهُمْ قُلُوبٌ لَّا يَفْقَهُونَ بِهَا وَلَهُمْ أَعْيُنٌ لَّا يُبْصِرُونَ بِهَا وَلَهُمْ ءَاذَانٌ لَّا يَسْمَعُونَ بِهَآ',mean:'They have hearts they do not understand with, eyes they do not see with, and ears they do not hear with. They are like cattle. In fact, they are even less guided! Such ˹people˺ are ˹entirely˺ heedless.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'baqarah-2-34':{ref:'al-Baqarah 2:34',ar:'وَإِذْ قُلْنَا لِلْمَلَـٰٓئِكَةِ ٱسْجُدُوا۟ لِـَٔادَمَ فَسَجَدُوٓا۟ إِلَّآ إِبْلِيسَ أَبَىٰ وَٱسْتَكْبَرَ',mean:'And ˹remember˺ when We said to the angels, "Prostrate before Adam," so they all did—but not Iblîs, who refused and acted arrogantly, becoming unfaithful.',src:'The Clear Quran · Dr. Mustafa Khattab · pending review'},
  'muslim-kibr':{kind:'The hadith',ref:'Ṣaḥīḥ Muslim 91',grade:'Sahih',ar:'الْكِبْرُ بَطَرُ الْحَقِّ وَغَمْطُ النَّاسِ',mean:'Pride is disdaining the truth (out of self-conceit) and contempt for the people.',src:'Ṣaḥīḥ Muslim 91 · via Sunnah.com · pending review'}
 },
 beats:[
  {t:'panel',variant:'tell',title:'Five inner pulls',intro:'Each starts as a thought that sounds perfectly reasonable. Learn the thought, and you catch the pull early.',
   items:[
    {name:'Ignorance of your belief',tell:'My belief will stay sound on its own. I don’t really need to learn it.',
     body:'What you never learn to recognise, you cannot guard against. A generation can inherit error simply because no one taught them the sound version, until they cannot tell it from <span class="term" data-term="jahiliyyah">jāhiliyyah</span>.'},
    {name:'Chasing what you want',tell:'If I want it strongly enough, it must be acceptable.',
     body:'When “what I want” becomes the judge of “what is true”, desire takes the seat evidence should hold. '+AW.cite('jathiya-45-23','al-Jāthiyah 45:23')},
    {name:'Following without proof',tell:'Everyone I respect does it this way, so I don’t need a reason.',
     body:'Inherited habit is not the same as knowing something is true. This is <span class="term" data-term="taqlid">taqlīd</span>. '+AW.cite('zukhruf-43-22','az-Zukhruf 43:22')},
    {name:'Never stopping to reflect',tell:'I believe. I just never really stop to think about it.',
     body:'Evidence you never look at cannot guide you. A distracted heart walks past the very signs meant to steady it. '+AW.cite('araf-7-179','al-Aʿraf 7:179')},
    {name:'Pride',tell:'Admitting I was wrong would make me look weak.',
     body:'Pride can make a person reject what they know is right. It was the first sin of all. '+AW.cite('baqarah-2-34','al-Baqarah 2:34')+' '+AW.cite('muslim-kibr','Ṣaḥīḥ Muslim 91')}],
   marker:{type:'remember',body:'Five pulls. Each begins as a thought that sounds fair. Naming it is the first step to catching it.'}},
  {t:'depth',point:'The most dangerous drift is the one that feels reasonable.',
   lenses:{reality:'Almost nobody decides to leave the truth. They take one reasonable-seeming step at a time, and only much later notice how far the ground has moved.',
   revelation:'The Qur’an paints the end of that road starkly. Hearts that no longer understand, eyes that no longer really see. '+AW.cite('araf-7-179','al-Aʿraf 7:179'),
   ruling:'So the guard is on the inside. Keep learning, keep reflecting, and stay humble enough to be corrected.'}},
  {t:'reflect',prompt:'Of the five inner pulls, which is easiest to spot in someone else, and which is hardest to catch in yourself?',
   model:'For most people they are the same one. The pulls are easy to name in others and quiet in ourselves, because from the inside each feels like a fair thought rather than a warning sign. A named pull is one you can notice next time it speaks up.'},
  {t:'mc',kicker:'Name the pull',q:'Which inner pull is speaking?',quote:'I don’t need a reason for this belief. Everyone I trust holds it, so it must be right.',
   o:['Chasing what you want','Following without proof','Pride'],c:1,
   good:'Trusting good people is fine, but their doing it is not evidence in itself. Belief needs a reason, not just familiar company.',
   gentle:'“Everyone I trust does it” is the mark of following without proof. Inherited habit is not the same as knowing.'},
  {t:'tf',q:'Pride can make a person reject something they actually know is true.',c:true,
   good:'The Prophet described pride as disdaining the truth and contempt for people. It was the first sin of all.',
   gentle:'This one is true. Pride rejects the truth to protect how you look, exactly as it turned Iblees away.'}
 ],
 grew:'You can now name the five inner pulls, and the tell-tale thought that gives each one away.',
 recap:['Not knowing your belief, and chasing what you want.','Following without proof, and never stopping to reflect.','Pride, which rejects the truth to protect how you look.'],
 doneTitle:'You can name them now',
 doneLine:'Five quiet pulls from the inside. Next, the voices that call from outside.',
 next:{href:'u2-m2.html',label:'The pulls from outside'}
