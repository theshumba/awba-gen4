  {t:'read',kicker:'A small story',title:'The slip of paper',
   html:'<p class="story-lead">A man is brought to account. Against him, ninety-nine scrolls of sins are unrolled, each stretching as far as the eye can see. He is asked if he denies any of it. He cannot.</p><p>Then a single slip of paper is brought out. On it, one testimony: that there is no god worthy of worship except Allah, and that Muhammad is His slave and Messenger. The man asks what one slip could possibly matter against ninety-nine scrolls.</p><p>The scrolls are set in one pan of the scale, the slip in the other. And the slip outweighs them all, for nothing could compare in weight to the name of Allah. The Prophet taught this, and the scholars explain why it weighed so much: the honesty, sincerity, and purity of heart carried inside it.</p>',
