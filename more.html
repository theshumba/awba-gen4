<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- viewport-fit=cover is the safe-area prerequisite (env(safe-area-inset-*) resolves to 0 without it). -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Awba · More</title>
<!-- Haram Cream — the Page ground (more.html is the quiet back room, the least-registered surface). -->
<meta name="theme-color" content="#F3EDE2">
<!-- The install head trio (root page) — cloned from learn.html; the manifest's start_url stays learn.html. -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<!-- Register the worker, guarded off file:// (double-click review + the file:// render harness stay a no-op) —
     relative path, no on-device state touched here. -->
<script>
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js'); });
  }
</script>
<!-- more.html sits at repo ROOT: every asset path is root-relative (shared/…), never ../. Preload the
     workhorse (Readex 400) + the Page-title weight (Readex 600) this surface leans on. -->
<link rel="preload" as="font" type="font/woff2" href="shared/fonts/readex-pro-400.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="shared/fonts/readex-pro-600.woff2" crossorigin>
<link rel="stylesheet" href="shared/awba-engine.css">
<script src="shared/awba-engine.js"></script>
<!-- The one page-authored block: a content block for the already-declared `screens` layer (never the
     name-list order line). Composition only — every value is a shipped var(--token), zero new hex, zero
     new glyph (the chevron + switch-knob are inline aria-hidden SVG, the doodle precedent). The register
     :focus-visible ring (crimson on the Page ground) rides in automatically from the engine grammar. -->
<style>
  @layer screens {
    /* the quiet back-room column — pinned to the shell width, cleared of the fixed bar by its own
       height + the safe-area inset, and lifted above the grain tile (z-index:1 over the ::after 0). */
    .mr-wrap {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin-inline: auto;
      padding: var(--sp-8) var(--sp-4)
               calc(var(--sp-16) + env(safe-area-inset-bottom));
    }

    .mr-kick {
      font-family: var(--font-marg);
      font-size: var(--fs-marg);
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-62);                 /* §2.1 secondary ink on cream */
    }
    .mr-title {
      margin: var(--sp-1) 0 0;
      font-family: var(--font-work);        /* law 5 — Page titles are Readex, not Marcellus */
      font-weight: 600;
      font-size: var(--fs-h1);
      line-height: 1.18;
      color: var(--ink);                    /* §2.1 --kiswah on cream, 16.22:1 */
    }

    .mr-sec { margin-top: var(--sp-8); }
    .mr-sec-h {
      margin: 0 0 var(--sp-1);
      font-family: var(--font-marg);
      font-size: var(--fs-marg);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-62);                 /* §2.1 secondary ink on cream */
    }

    /* one row grammar for every entry — a hairline-ruled list line. Actionable rows (links/buttons)
       reset the UA control chrome and carry the shipped .sheet-row press; static rows are plain divs. */
    .mr-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      width: 100%;
      min-height: 44px;                     /* the 44px tap target */
      padding: var(--sp-3) 0;
      border: 0;
      border-bottom: 1px solid var(--rule); /* jadwal hairline between rows */
    }
    .mr-sec .mr-row:last-child { border-bottom: 0; }
    a.mr-row, button.mr-row {
      appearance: none;
      -webkit-appearance: none;
      background: none;
      font: inherit;
      color: inherit;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
    }

    .mr-rowtext { display: flex; flex-direction: column; gap: var(--sp-2); min-width: 0; }
    .mr-label {
      font-family: var(--font-work);
      font-weight: 600;
      font-size: var(--fs-body);
      color: var(--ink);                    /* §2.1 --kiswah on cream */
    }
    .mr-sub {
      font-family: var(--font-work);
      font-size: var(--fs-ui);
      line-height: 1.45;
      color: var(--ink-62);                 /* §2.1 secondary ink on cream, 5.02:1 */
    }
    .mr-ctl { display: inline-flex; align-items: center; flex: 0 0 auto; }

    /* the chevron — a quiet inline aria-hidden mark (no new glyph), inks the muted-ink budget. */
    .mr-chev { display: inline-flex; flex: 0 0 auto; color: var(--ink-40); }
    .mr-chev svg { width: 20px; height: 20px; }

    /* the reduce-motion switch (native role="switch") — a ruled track that inks crimson when on;
       the knob (inline aria-hidden SVG) slides on the one paper-press duration. 44px hit target. */
    .mr-switch {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2s);
      min-height: 44px;
      padding: var(--sp-2) 0;
      border: 0;
      background: none;
      font-family: var(--font-marg);
      font-size: var(--fs-marg);
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink-62);                 /* §2.1 secondary ink on cream */
      cursor: pointer;
    }
    .mr-sw-txt { min-width: 2.2em; text-align: right; }
    .mr-sw-track {
      position: relative;
      width: 44px;
      height: 24px;
      flex: 0 0 auto;
      border-radius: var(--r-1);            /* the switch track — a barely-eased edge (--r-pill is rationed) */
      background: var(--rule);              /* off — a quiet hairline fill */
      transition: background var(--dur-press) var(--ease);
    }
    .mr-switch[aria-checked="false"] .mr-sw-track { box-shadow: inset 0 0 0 1px var(--ink-62); }  /* off — a perceivable boundary (≥3:1) */
    .mr-switch[aria-checked="true"] .mr-sw-track { background: var(--crimson); }  /* on — Page accent */
    .mr-sw-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      color: var(--cream);                  /* the knob rides cream on both ends */
      transition: transform var(--dur-press) var(--ease);
    }
    .mr-switch[aria-checked="true"] .mr-sw-knob { transform: translateX(20px); }

    /* the colophon foot — Courier marginalia, quiet and centred. */
    .mr-about {
      margin-top: var(--sp-8);
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
      text-align: center;
      font-family: var(--font-marg);
      font-size: var(--fs-marg);
      line-height: 1.5;
      color: var(--ink-62);                 /* §2.1 secondary ink on cream */
    }

    /* -- sheet prose (the four explainer sheets ride the shipped cream AW.sheet singleton) -------- */
    .mr-sheet { display: flex; flex-direction: column; gap: var(--sp-4); }
    .mr-sheet-h {
      margin: 0;
      font-family: var(--font-work);
      font-weight: 600;
      font-size: var(--fs-h2);
      line-height: 1.3;
      color: var(--ink);
    }
    .mr-sheet-p {
      margin: 0;
      font-family: var(--font-work);
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--ink-85);                 /* §2.1 strong body ink on cream */
    }
    .mr-pill-row { display: flex; justify-content: center; }
    .mr-sheet-actions {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2s);
      margin-top: var(--sp-2s);
    }
    /* The cream-ground destroy-ghost (start-over confirm) now rides the shipped engine grammar:
       .sheet .btn.ghost is styled in awba-engine.css @layer components (quiet transparent key,
       --ink-62 label, --keyline separation, hover → full --ink) — no per-page rule needed. */

    /* -- the travel-code field + a hairline rule (E1.6) — composition only, zero new hex/token/glyph.
       A code reads as marginalia, so it wears the sanctioned Courier mono; the long readonly token
       scrolls in place rather than wrapping the sheet. The crimson :focus-visible ring rides in from
       the engine grammar (cream Page ground). ---- */
    .mr-code-field {
      width: 100%;
      padding: var(--sp-2s) var(--sp-3);
      border: 1px solid var(--rule);
      border-radius: var(--r-2);
      background: var(--cream);
      min-height: 44px;                  /* the tap-target bar every control meets (E1.7) */
      color: var(--ink);                 /* §2.1 --kiswah on cream, 16.22:1 */
      font: var(--fs-ui) var(--font-marg);  /* a code reads as marginalia — the sanctioned mono */
      white-space: nowrap;
      overflow-x: auto;                  /* the long readonly token scrolls in place, never wraps the sheet */
    }
    .mr-code-field:read-only { color: var(--ink-85); }   /* §2.1 strong body ink on cream */
    .mr-rule { height: 1px; background: var(--rule); margin: var(--sp-2s) 0; border: 0; }
  }
</style>
</head>
<body>
<main class="reg-page grain" id="app"></main>
<script>
(function () {
  'use strict';

  var app = document.getElementById('app');

  /* Engine-freshness guard (the v2.2 review law, the learn.html pattern): the first post-update
     navigation can pair this fresh page with the previous cached engine — if a seam this page
     needs is missing (or the engine failed entirely), render a calm one-tap heal instead of a
     half-wired settings page. Every class below is this page's own inline style or the base .btn. */
  if (!window.AW || !AW.muteBtnHtml || !AW.bindMuteBtn || !AW.streakSheet
      || !AW.S || !AW.S.reset || !AW.S.exportToken || !AW.S.importToken) {
    app.innerHTML =
      '<div class="mr-wrap">' +
        '<header><p class="mr-kick">One moment</p>' +
        '<h1 class="mr-title">Awba has just updated</h1></header>' +
        '<p class="mr-sub">A newer Awba arrived underneath this page.</p>' +
        '<a class="btn" href="more.html">Continue</a>' +
      '</div>';
    return;
  }

  /* ---- small helpers (no on-device state touched on this page — every read/write goes through AW) ---- */
  function wire(id, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('click', fn);
  }
  function motionReduced() {
    return AW.prefs.get('motion', 'system') === 'reduce';
  }

  /* ---- the four explainer sheets (shipped cream AW.sheet; each carries its label as its a11y name) ---- */
  function sheetHowItWorks() {
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<p class="mr-sheet-p">Awba teaches the foundations of belief in small steps — fifteen lessons and four reviews, walked at your own pace.</p>' +
        '<p class="mr-sheet-p">Noor is light you gather as you learn. It is never spent against you, and it never runs out.</p>' +
        '<p class="mr-sheet-p">Returns counts the days you come back. It only grows, and it can never break.</p>' +
        '<p class="mr-sheet-p">A wrong answer is never punished — a gentle word, and a chance to look again.</p>' +
        '<p class="mr-sheet-p">No accounts, no streaks to lose, nothing to buy. Just a path, and light to walk it by.</p>' +
      '</div>';
    AW.sheet(html, 'How Awba works');
  }

  function sheetSources() {
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<p class="mr-sheet-p">Every verse and hadith in Awba is shown word-for-word from its source — we never paraphrase, and we hold anything sensitive back until it\'s checked. Each one carries a quiet mark:</p>' +
        '<div class="mr-pill-row"><span class="r-pill">unverified · pending review</span></div>' +
        '<p class="mr-sheet-p">Nothing here has been signed off by a scholar yet. When it is, this note will change.</p>' +
      '</div>';
    AW.sheet(html, 'Where our words come from');
  }

  function sheetInstall() {
    /* feature-detect the platform line — iOS/Safari exposes navigator.standalone; everything else
       gets the browser-menu line. No dependence on a captured install-prompt event. */
    var iosLike = ('standalone' in navigator);
    var line = iosLike
      ? 'On iPhone or iPad: tap Share, then Add to Home Screen.'
      : 'On Android or desktop: open your browser menu, then Install (or Add to Home Screen).';
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<p class="mr-sheet-p">' + line + '</p>' +
        '<p class="mr-sheet-p">Add it once, and your path is always here.</p>' +
      '</div>';
    AW.sheet(html, 'Add to your home screen');
  }

  /* ---- Move to a new device (E1) — "take your light with you." The ONE two-half sheet: the top half
         hands out a travel code (AW.S.exportToken), the bottom half brings one in (AW.S.importToken).
         All progress logic lives in the engine seam; this is thin native wiring (input/button +
         AW.sheet + AW.announce). The words export/import/token/base64 never surface — it is "a travel
         code." A valid check → the keep/replace confirm (keep = primary, Escape = keep). ---- */
  function openMoveSheet() {
    /* The first navigation after an update can briefly pair this fresh page with the previous
       cached engine (HTML is network-first, the engine cache-first) — the seam may not exist yet.
       Refuse calmly; a full close-and-reopen self-heals (the practice.html guard pattern). */
    if (!AW.S.exportToken || !AW.S.importToken) {
      AW.sheet(
        '<div class="grip"></div><div class="mr-sheet">' +
          '<h2 class="mr-sheet-h">One moment</h2>' +
          '<p class="mr-sheet-p">Awba has just updated underneath this page. Close it fully, reopen it, and this will be ready.</p>' +
        '</div>', 'One moment');
      return;
    }
    var code = AW.S.exportToken();
    /* code === null: the saved blob carries a field btoa can't encode (a legacy-migrated oddity) —
       the take-half degrades to one honest line; bringing a code IN still works below. */
    var takeHalf = code
      ? '<p class="mr-sheet-p">This code holds your whole path. Open Awba on your new device, come back here, and paste it under “Bring it here.”</p>' +
        '<input class="mr-code-field" id="moveCode" type="text" readonly aria-label="Your travel code" spellcheck="false" autocomplete="off">' +
        '<button class="btn" type="button" id="moveCopy">Copy the code</button>'
      : '<p class="mr-sheet-p">This device\'s saved path can\'t be written out as a code. You can still bring a code in below.</p>';
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<h2 class="mr-sheet-h">Take it with you</h2>' +
        takeHalf +
        '<div class="mr-rule" aria-hidden="true"></div>' +
        '<h2 class="mr-sheet-h">Bring it here</h2>' +
        '<p class="mr-sheet-p">Paste a code from your other device to carry its path onto this one.</p>' +
        '<input class="mr-code-field" id="moveIn" type="text" aria-label="Paste your travel code" spellcheck="false" autocomplete="off">' +
        '<button class="btn" type="button" id="moveCheck">Check the code</button>' +
        '<p class="mr-sub" id="moveWhy" role="alert" hidden></p>' +
      '</div>';
    AW.sheet(html, 'Move to a new device');
    var f = document.getElementById('moveCode');
    if (f) f.value = code;                 // set the readonly token via .value (never an HTML attribute)
    wire('moveCopy', copyCode);
    wire('moveCheck', checkCode);
  }

  /* copy the readonly code — clipboard API with an execCommand select-fallback; never a dead end. */
  function copyCode() {
    var f = document.getElementById('moveCode');
    if (!f) return;
    var done = function () { AW.announce('Copied.'); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(f.value).then(done, selectFallback);
    } else { selectFallback(); }
    function selectFallback() {
      f.focus(); f.select();
      try { if (document.execCommand && document.execCommand('copy')) { done(); return; } } catch (e) {}
      AW.announce('Select the code, then copy it.');    // leaves it selected — never a dead end
    }
  }

  /* check a pasted code — an invalid one shows its gentle reason in-place (role="alert", never
     stealing focus); a valid one advances to the keep/replace confirm. */
  function checkCode() {
    var res = AW.S.importToken(document.getElementById('moveIn').value);
    var why = document.getElementById('moveWhy');
    if (!res.ok) { why.textContent = res.why; why.hidden = false; AW.announce(res.why); return; }
    why.hidden = true;
    moveConfirm(res);                                   // valid → the keep/replace confirm (below)
  }

  /* the keep/replace confirm (Start-over pattern) — a valid code REPLACES the local blob wholesale,
     never a silent merge (E1.4). keep = primary + first in source; replace = quiet ghost; focus lands
     on the heading so the SR reads the preview before the choice; Escape closes (= keep). */
  function moveConfirm(res) {
    var noor = res.preview.noor, returns = res.preview.returns, n = res.preview.lessonsDone;
    var retS = returns + (returns === 1 ? ' return' : ' returns');
    var lesS = n + (n === 1 ? ' lesson finished' : ' lessons finished');
    var previewLine = 'This code carries ' + noor + ' noor, ' + retS + ', ' + lesS + '.';
    var droppedLine = res.preview.dropped > 0
      ? '<p class="mr-sub">A few unrecognised marks were left out.</p>' : '';
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<h2 class="mr-sheet-h" id="moveConfirmH" tabindex="-1">Bring this path here?</h2>' +
        '<p class="mr-sheet-p">' + previewLine + '</p>' +
        '<p class="mr-sheet-p">It will replace what\'s on this device — the light here steps aside for the light that\'s arriving. This can\'t be undone.</p>' +
        droppedLine +
        '<div class="mr-sheet-actions">' +
          '<button class="btn" type="button" id="moveKeep">Keep what\'s here</button>' +
          '<button class="btn ghost" type="button" id="moveApply">Bring it in</button>' +
        '</div>' +
      '</div>';
    AW.sheet(html, 'Bring this path here?');
    var h = document.getElementById('moveConfirmH');
    if (h) h.focus();                                   // preview announced before the keep/replace choice
    wire('moveKeep', function () { AW.sheet.close(); });
    wire('moveApply', function () { applyMove(res); });
  }

  /* Bring it in — REPLACE via the persist seam, narrate the arrival, re-render More (idempotent), then
     the arrival confirmation. */
  function applyMove(res) {
    res.apply();                                        // REPLACE via the persist seam
    AW.announce('Your light has arrived.');
    render();                                           // re-render More (idempotent; keeps state coherent)
    var doneHtml =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<h2 class="mr-sheet-h">Your light has arrived.</h2>' +
        '<p class="mr-sheet-p">Your path is now here, exactly as it was. Welcome back.</p>' +
        '<div class="mr-sheet-actions">' +
          '<button class="btn" type="button" id="moveBack">Back to the path</button>' +
        '</div>' +
      '</div>';
    AW.sheet(doneHtml, 'Your light has arrived.');      // the arrival confirmation
    wire('moveBack', function () { window.location.href = 'learn.html'; });
  }

  /* ---- Start over — the calm two-sheet double-confirm (keep = prominent .btn; destroy = quiet ghost,
         never rose/red). Two fresh sheets make a rapid double-tap impossible to blow through; Escape
         closes any step (= keep). On confirm: AW.S.reset() (clears progress, PRESERVES ringSeed +
         every pref/name/onboarding flag), then the fresh-path confirmation + the announce. ---- */
  function startOver1() {
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<h2 class="mr-sheet-h">Start over?</h2>' +
        '<p class="mr-sheet-p">This clears your noor, your returns, and every star — and begins the path anew. Your settings and your name stay, and your ring keeps its own hand. It can\'t be undone.</p>' +
        '<div class="mr-sheet-actions">' +
          '<button class="btn" type="button" id="soKeep1">Keep everything</button>' +
          '<button class="btn ghost" type="button" id="soNext">Start over</button>' +
        '</div>' +
      '</div>';
    AW.sheet(html, 'Start over?');
    wire('soKeep1', function () { AW.sheet.close(); });
    wire('soNext', startOver2);
  }

  function startOver2() {
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<h2 class="mr-sheet-h">One more time — are you sure?</h2>' +
        '<p class="mr-sheet-p">Once cleared, your light and your returns can\'t be brought back. You can always begin again from here.</p>' +
        '<div class="mr-sheet-actions">' +
          '<button class="btn" type="button" id="soKeep2">No, keep it</button>' +
          '<button class="btn ghost" type="button" id="soClear">Yes, clear it</button>' +
        '</div>' +
      '</div>';
    AW.sheet(html, 'One more time');
    wire('soKeep2', function () { AW.sheet.close(); });
    wire('soClear', startOverConfirm);
  }

  function startOverConfirm() {
    AW.S.reset();                          /* clears progress, preserves ringSeed + prefs (Wave-A seam) */
    var html =
      '<div class="grip"></div>' +
      '<div class="mr-sheet">' +
        '<h2 class="mr-sheet-h">A fresh path begins.</h2>' +
        '<p class="mr-sheet-p">Your light and returns are cleared. The same ring is waiting to be inked again.</p>' +
        '<div class="mr-sheet-actions">' +
          '<button class="btn" type="button" id="soBack">Back to the path</button>' +
        '</div>' +
      '</div>';
    AW.sheet(html, 'A fresh path begins.');
    wire('soBack', function () { window.location.href = 'learn.html'; });
    AW.announce('Your progress has been cleared. A fresh path begins.');
  }

  /* ---- the reduce-motion switch — writes the awba prefs motion key, stamps/removes the <html>
         reduce attribute so the engine's @layer motion collapse rides in, and narrates both ways ---- */
  function toggleMotion() {
    var sw = document.getElementById('motionSwitch');
    var on = sw.getAttribute('aria-checked') !== 'true';
    AW.prefs.set('motion', on ? 'reduce' : 'system');
    if (on) {
      document.documentElement.setAttribute('data-motion', 'reduce');
    } else {
      document.documentElement.removeAttribute('data-motion');
    }
    sw.setAttribute('aria-checked', on ? 'true' : 'false');
    sw.querySelector('.mr-sw-txt').textContent = on ? 'On' : 'Off';
    AW.announce(on ? 'Reduced motion on.' : 'Reduced motion off.');
  }

  /* ---- the shared 44px mute pattern — re-mounted on toggle so the glyph + aria-pressed swap ---- */
  function mountMute() {
    var host = document.getElementById('soundCtl');
    if (!host) return;
    host.innerHTML = AW.muteBtnHtml();
    AW.bindMuteBtn(mountMute);
  }

  /* ---- the tab bar (§E) — inactive tabs are real <a href> links, More is the active scroll-to-top
         button, Returns opens the ONE streak sheet everywhere (never navigates) ---- */
  function tab(id, active, scene, label, href) {
    if (active) {
      return '<button class="tab active" type="button" id="' + id + '" aria-current="page">' +
        '<span class="otab-ic">' + AW.icon(scene) + '</span>' + label + '</button>';
    }
    if (href) {
      return '<a class="tab" id="' + id + '" href="' + href + '">' +
        '<span class="otab-ic">' + AW.icon(scene) + '</span>' + label + '</a>';
    }
    return '<button class="tab" type="button" id="' + id + '">' +
      '<span class="otab-ic">' + AW.icon(scene) + '</span>' + label + '</button>';
  }

  var CHEV = '<svg class="mr-chev" viewBox="0 0 24 24" aria-hidden="true" focusable="false">' +
    '<path d="M9 6 L15 12 L9 18" fill="none" stroke="currentColor" stroke-width="2" ' +
    'stroke-linecap="round" stroke-linejoin="round"></path></svg>';

  var KNOB = '<svg class="mr-sw-knob" viewBox="0 0 20 20" aria-hidden="true" focusable="false">' +
    '<circle cx="10" cy="10" r="9" fill="currentColor"></circle></svg>';

  function render() {
    var reduced = motionReduced();

    /* install row — a live static row when already on the home screen, else a sheet-opening button. */
    var installed =
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
      navigator.standalone === true;
    var installRow = installed
      ? '<div class="mr-row">' +
          '<span class="mr-rowtext"><span class="mr-label">On your home screen</span></span>' +
        '</div>'
      : '<button class="mr-row sheet-row" type="button" id="rowInstall">' +
          '<span class="mr-rowtext"><span class="mr-label">Add to your home screen</span></span>' +
          CHEV +
        '</button>';

    var header =
      '<header>' +
        '<p class="mr-kick">More</p>' +
        '<h1 class="mr-title">Settings &amp; about</h1>' +
      '</header>';

    var secSoundMotion =
      '<section class="mr-sec">' +
        '<h2 class="mr-sec-h">Sound &amp; motion</h2>' +
        '<div class="mr-row">' +
          '<span class="mr-rowtext">' +
            '<span class="mr-label">Sound</span>' +
            '<span class="mr-sub">Calm cues as you learn.</span>' +
          '</span>' +
          '<span class="mr-ctl" id="soundCtl"></span>' +
        '</div>' +
        '<div class="mr-row">' +
          '<span class="mr-rowtext">' +
            '<span class="mr-label" id="motionLbl">Reduce motion</span>' +
            '<span class="mr-sub">Calms animations across Awba. Your device setting is always respected too.</span>' +
          '</span>' +
          '<button class="mr-switch" type="button" id="motionSwitch" role="switch" ' +
            'aria-checked="' + (reduced ? 'true' : 'false') + '" aria-labelledby="motionLbl">' +
            '<span class="mr-sw-txt" aria-hidden="true">' + (reduced ? 'On' : 'Off') + '</span>' +
            '<span class="mr-sw-track" aria-hidden="true">' + KNOB + '</span>' +
          '</button>' +
        '</div>' +
      '</section>';

    var secPath =
      '<section class="mr-sec">' +
        '<h2 class="mr-sec-h">The path</h2>' +
        '<a class="mr-row sheet-row" id="rowWelcome" href="onboarding.html">' +
          '<span class="mr-rowtext"><span class="mr-label">See the welcome again</span></span>' +
          CHEV +
        '</a>' +
        '<button class="mr-row sheet-row" type="button" id="rowHow">' +
          '<span class="mr-rowtext"><span class="mr-label">How Awba works</span></span>' +
          CHEV +
        '</button>' +
      '</section>';

    var secHonesty =
      '<section class="mr-sec">' +
        '<h2 class="mr-sec-h">Honesty</h2>' +
        '<button class="mr-row sheet-row" type="button" id="rowSources">' +
          '<span class="mr-rowtext"><span class="mr-label">Where our words come from</span></span>' +
          CHEV +
        '</button>' +
      '</section>';

    var secDevice =
      '<section class="mr-sec">' +
        '<h2 class="mr-sec-h">Your device</h2>' +
        installRow +
        '<button class="mr-row sheet-row" type="button" id="rowMove">' +
          '<span class="mr-rowtext">' +
            '<span class="mr-label">Move to a new device</span>' +
            '<span class="mr-sub">Carry your light — your noor, returns and finished lessons — to another phone.</span>' +
          '</span>' +
          CHEV +
        '</button>' +
        '<button class="mr-row sheet-row" type="button" id="rowStartOver">' +
          '<span class="mr-rowtext">' +
            '<span class="mr-label">Start over</span>' +
            '<span class="mr-sub">Clear your progress and begin the path anew.</span>' +
          '</span>' +
          CHEV +
        '</button>' +
      '</section>';

    var about =
      '<footer class="mr-about">' +
        '<span>Awba · version 2.3</span>' +
        '<span>A companion, not a cop.</span>' +
        '<span>Every citation is pending scholarly review.</span>' +
      '</footer>';

    var tabs =
      '<nav class="otabs" aria-label="Sections">' +
        tab('tabLearn', false, 'lamp', 'Learn', 'learn.html') +
        tab('tabPractice', false, 'beads', 'Practice', 'practice.html') +
        tab('tabReturns', false, 'flame', 'Returns', null) +
        tab('tabProfile', false, 'man', 'Profile', 'profile.html') +
        tab('tabMore', true, 'pattern', 'More', null) +
      '</nav>';

    app.innerHTML =
      '<div class="mr-wrap">' +
        header + secSoundMotion + secPath + secHonesty + secDevice + about +
      '</div>' + tabs;

    /* ---- wiring (re-attached after the single innerHTML build) ---- */
    mountMute();
    wire('motionSwitch', toggleMotion);
    wire('rowHow', sheetHowItWorks);
    wire('rowSources', sheetSources);
    wire('rowInstall', sheetInstall);
    wire('rowMove', openMoveSheet);
    wire('rowStartOver', startOver1);

    /* tab bar: More scrolls home; Returns opens the ONE streak sheet (never a second sheet). */
    wire('tabMore', function () {
      window.scrollTo({ top: 0, behavior: AW.reducedMotion() ? 'auto' : 'smooth' });
    });
    var tR = document.getElementById('tabReturns');
    if (tR) {
      /* no aria-label override — the accessible name stays the visible "Returns" (WCAG 2.5.3) */
      tR.addEventListener('click', function () { AW.streakSheet(); });
    }
  }

  render();
})();
</script>
</body>
</html>
