<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- viewport-fit=cover is the safe-area prerequisite (env(safe-area-inset-*) resolves to 0 without it). -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Awba · Learn</title>
<!-- Kiswah Black — the Orbit ground (matches reviews/*, the dark register; lessons use cream #F3EDE2). -->
<meta name="theme-color" content="#131013">
<!-- D-70: the install head trio — learn.html is itself the installable app; index.html carries the same trio. -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<!-- D-71: register the SW, guarded off file:// (double-click review + the file:// render-smoke
     harness stay a no-op) — relative path, no storage touched. -->
<script>
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js'); });
  }
</script>
<!-- learn.html sits at repo ROOT: every asset path is root-relative (shared/…), NEVER ../ — it mirrors
     preview.html's head, not the lessons/ head one level down. Preload the two critical faces only. -->

<!-- The only page-authored CSS (§S6): the two D-62/R-9 conversions' seam styling — a native-button
     chrome reset for the streak strip and the quiet marginalia affordance on the daily-ayah card.
     A content block for the already-declared `screens` layer (never the name-list order line); zero
     new tokens, zero new hex — every value is a shipped variable. The register :focus-visible ring
     (the ring on the Orbit ground) rides in automatically from the engine grammar, untouched here. -->
<style>
  @layer screens {
    /* Streak strip: div→native <button> (D-62). Strip the UA button chrome so the shipped .ob-streak
       block styling reads unchanged; the flex column + settle stay from the engine class. */
    #streakStrip {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
    }
    /* "Read the citation" (R-9) — the daily-ayah affordance: a quiet Courier marginalia line that owns
       the keyboard/SR entry to the citation sheet while the sacred .ayah keeps its isolated reading. It
       sits under the ayah's reverence budget (law 3/7) — no display weight, no fill; a hairline
       underline is the only affordance cue, deepening on hover; the register ring lands on focus. */
    .oayah-cite {
      appearance: none;
      -webkit-appearance: none;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      min-height: 44px;                 /* the 44px tap target without inflating the 12px line */
      padding: 0;
      background: none;
      border: 0;
      font-family: var(--font-marg);
      font-size: var(--fs-marg);
      letter-spacing: .09em;
      color: var(--paper-62);           /* §2.1 --paper-62 on Kiswah ~6.7:1 — the quiet marginalia budget */
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      text-decoration-color: var(--paper-45);
      cursor: pointer;
      transition: color 160ms ease, text-decoration-color 160ms ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .oayah-cite:hover { color: var(--cream); text-decoration-color: var(--paper-62); }
    }
    .oayah-cite:active { transform: translateY(1px); }   /* the shipped Athar paper-press, quiet */
    @media (prefers-reduced-motion: reduce) {
      .oayah-cite:active { transform: none; }            /* law-9 stillness under reduced motion */
    }

    /* The add-to-home nudge (D-72 / PLT-03) — a mercy-toned, dismissible invitation, JS-mounted on
       document.body (so a render() rebuild of #app never wipes it) and given the reg-orbit class so
       the shipped Orbit register grammar rides in: the gold :focus-visible ring, --icon-accent gold,
       the paper-press vocabulary. It reads as a sibling of the Continue card — a Layl-Navy panel with
       cream ink on the Kiswah ground — never a browser-chrome afterthought. Zero new token / hex /
       glyph: every value is a shipped variable; the lamp is a reused AW.KIT scene. The wrapper's own
       Kiswah fill and the --dawn horizon glow are neutralised so only the floating card shows. */
    .aw-nudge {
      position: fixed;
      left: 0; right: 0;
      bottom: calc(var(--awn-lift, 64px) + var(--sp-4));    /* JS measures the fixed tab bar — no magic number */
      z-index: 60;                                          /* above the tab bar (50), below the popup (70) */
      max-width: 480px; margin-inline: auto;                /* pinned to the shell column, like .otabs */
      padding-inline: var(--sp-4);
      background: transparent;                              /* only the inner card paints; no full-width bar */
      --dawn: 0;                                            /* silence the ground horizon-glow inside the banner */
      opacity: 0;
      transform: translateY(12px);                         /* enters from just below — never from scale(0) */
      transition: opacity var(--dur-sheet) var(--ease),
                  transform var(--dur-sheet) var(--ease);   /* a drawer-scale settle on THE easing family */
      pointer-events: none;
    }
    .aw-nudge.is-in { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .aw-nudge.is-out {                                      /* exit is snappier than enter (asymmetric) */
      opacity: 0; transform: translateY(12px);
      transition-duration: var(--dur-fade);
    }
    .awn-card {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: var(--sp-2s) var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--navy);                              /* §2.1 Layl Navy structural panel, mirroring .cc */
      color: var(--cream);                                 /* cream on navy, ≥13:1 */
      border-radius: var(--r-3);
      box-shadow: var(--edge-line);                        /* a hairline on dark — never a drop shadow (law) */
    }
    .awn-ic { display: inline-flex; line-height: 0; flex: 0 0 auto; color: var(--gold); }
    .awn-copy { flex: 1 1 12rem; min-width: 0; }
    .awn-title {
      margin: 0;
      font-family: var(--font-work); font-weight: 600;
      font-size: var(--fs-body); line-height: 1.35;
      color: var(--cream);
    }
    .awn-line {
      margin: var(--sp-1) 0 0;
      font-family: var(--font-work);
      font-size: var(--fs-ui); line-height: 1.5;
      color: var(--paper-62);                              /* secondary marginalia budget — 6.7:1 on dark */
    }
    .awn-acts { display: flex; align-items: center; gap: var(--sp-2s); margin-left: auto; }
    .awn-add { width: auto; padding: var(--sp-2s) var(--sp-4); }   /* the shipped gold-ghost .btn, auto-width */
    .awn-dismiss {                                         /* a quiet native dismiss — the register ring lands on focus */
      appearance: none; -webkit-appearance: none;
      display: inline-flex; align-items: center;
      min-height: 44px; padding: 0 var(--sp-2s);
      background: none; border: 0;
      font-family: var(--font-work); font-size: var(--fs-ui);
      color: var(--paper-62);
      cursor: pointer;
      transition: color var(--dur-fade) var(--ease), transform var(--dur-press) var(--ease);
    }
    .awn-dismiss:active { transform: translateY(1px); }   /* the ONE shipped Athar paper-press */
    @media (hover: hover) and (pointer: fine) {
      .awn-dismiss:hover { color: var(--cream); }
    }
    @media (prefers-reduced-motion: reduce) {
      .aw-nudge { transform: none; transition: opacity var(--dur-fade) var(--ease); }   /* fade only, no motion */
      .aw-nudge.is-in { transform: none; }
      .aw-nudge.is-out { transform: none; }
      .awn-dismiss:active { transform: none; }
    }
  }
</style>
</head>
<body>
<main class="reg-orbit grain" id="app"></main>
<script>
/* ============================================================================================
   learn.html — the Orbit front door ("a day in Awba", moment 1). A page, not an AwbaLesson cfg:
   ONE inline classic script holding the course data + render() + wiring. Every surface consumes
   shipped AW.* primitives; the only new CSS is @layer screens composition. All state is read
   through AW.state() only (D-24) — no raw storage-key access on this page.
   ============================================================================================ */
(function () {
  'use strict';

  /* First-run redirect (§0.4, loop-proof, storage-off-safe) — before any data literal or render():
     a fresh visitor (onboardingDone unset) with no ?begin=1 loop-breaker is sent to the welcome and
     we bail out of the IIFE before #app is touched (no flash of learn UI). location.replace() leaves
     no history entry, so Back never loops. onboarding's Begin/Skip set the flag AND append ?begin=1,
     which short-circuits this guard for that one navigation even if the pref write no-oped. */
  if (window.AW && AW.prefs && !AW.prefs.get('onboardingDone', false)
      && location.search.indexOf('begin=1') === -1) {
    location.replace('onboarding.html');
    return;
  }

  /* Course structure — derived from the ONE canonical source shared/course-structure.js (S6,
     window.AWBA_COURSE), loaded before this script. This reconstructs the exact
     {n,title,desc,nodes:[{id,href?,label,review?,chest?}]} shape the render already reads
     (output-identical, no downstream change); the byte-faithful ids/hrefs/labels/review/chest now
     live in the single source (an exact byte-copy file move, R6 §5). English unit titles are kept
     (R-6 chapter-term fallback); the retired `color` field never existed here. */
  var UNITS = window.AWBA_COURSE.units.map(function (u) {
    return { n: u.n, title: u.title, desc: u.desc, nodes: u.nodes.map(function (nd) {
      var o = { id: nd.id, label: nd.label };
      if (nd.href) o.href = nd.href;
      if (nd.kind === 'review') o.review = true;
      if (nd.kind === 'chest')  o.chest = true;
      return o;
    }) };
  });

  /* Daily-ayah pool — spliced BYTE-VERBATIM from Gen-3 _MVP-BUILD/learn.html (scripture law: splice,
     never retype; the ˹ ˺ brackets intact). Rotation is AW.dailyIndex (day-of-year), never getDate().
     Byte-fidelity is SHA-gated by scripts/port-audit.mjs (must print DAILY BYTES OK). */
  const DAILY=[
 {ref:'ar-Rūm 30:30',ar:'فَأَقِمْ وَجْهَكَ لِلدِّينِ حَنِيفًا ۚ فِطْرَتَ ٱللَّهِ ٱلَّتِى فَطَرَ ٱلنَّاسَ عَلَيْهَا',tr:'So be steadfast in faith in all uprightness ˹O Prophet˺—the natural Way of Allah which He has instilled in ˹all˺ people.'},
 {ref:'al-Ḥijr 15:9',ar:'إِنَّا نَحْنُ نَزَّلْنَا ٱلذِّكْرَ وَإِنَّا لَهُۥ لَحَـٰفِظُونَ',tr:'It is certainly We Who have revealed the Reminder, and it is certainly We Who will preserve it.'},
 {ref:'al-Anʿām 6:82',ar:'ٱلَّذِينَ ءَامَنُوا۟ وَلَمْ يَلْبِسُوٓا۟ إِيمَـٰنَهُم بِظُلْمٍ أُو۟لَـٰٓئِكَ لَهُمُ ٱلْأَمْنُ وَهُم مُّهْتَدُونَ',tr:'It is ˹only˺ those who are faithful and do not tarnish their faith with falsehood who are guaranteed security and are ˹rightly˺ guided.'},
 {ref:'al-Baqarah 2:163',ar:'وَإِلَـٰهُكُمْ إِلَـٰهٌ وَٰحِدٌ ۖ لَّآ إِلَـٰهَ إِلَّا هُوَ ٱلرَّحْمَـٰنُ ٱلرَّحِيمُ',tr:'Your God is ˹only˺ One God. There is no god ˹worthy of worship˺ except Him—the Most Compassionate, Most Merciful.'},
 {ref:'an-Naḥl 16:97',ar:'مَنْ عَمِلَ صَـٰلِحًا مِّن ذَكَرٍ أَوْ أُنثَىٰ وَهُوَ مُؤْمِنٌ فَلَنُحْيِيَنَّهُۥ حَيَوٰةً طَيِّبَةً',tr:'Whoever does good, whether male or female, and is a believer, We will surely bless them with a good life.'},
 {ref:'an-Naml 27:62',ar:'أَمَّن يُجِيبُ ٱلْمُضْطَرَّ إِذَا دَعَاهُ وَيَكْشِفُ ٱلسُّوٓءَ',tr:'Who responds to the distressed when they cry to Him, relieving ˹their˺ affliction?'},
 {ref:'aḏ-Ḏāriyāt 51:56',ar:'وَمَا خَلَقْتُ ٱلْجِنَّ وَٱلْإِنسَ إِلَّا لِيَعْبُدُونِ',tr:'I did not create jinn and humans except to worship Me.'}
];


  /* Flatten into the CNT-03 reveal sequence + a parallel per-node unit meta (number + English
     title) for the continue card + course chip. Never mutate the node objects. */
  var flat = [], meta = [], byId = {}, metaById = {};
  UNITS.forEach(function (u) {
    u.nodes.forEach(function (nd) {
      flat.push(nd); meta.push({ un: u.n, ut: u.title });
      byId[nd.id] = nd; metaById[nd.id] = { un: u.n, ut: u.title };
    });
  });

  var app = document.getElementById('app');

  /* The known node-id set (D-61 security V5) — a #<node-id> hash is honoured ONLY after matching it
     against THIS set; the raw hash is never written into markup, only used to find a scroll target. */
  var idSet = {};
  flat.forEach(function (nd) { idSet[nd.id] = true; });

  var booted = false, observing = false, curActiveId = null;

  /* smoothPath — a Catmull-Rom spline (as cubic béziers) that passes THROUGH every node centre, so
     the ink thread reads as one flowing hand-drawn line rather than straight segments. */
  function smoothPath(pts) {
    if (pts.length < 2) return pts.length ? ('M' + pts[0].x + ' ' + pts[0].y) : '';
    var d = 'M' + pts[0].x.toFixed(2) + ' ' + pts[0].y.toFixed(2);
    for (var i = 0; i < pts.length - 1; i++) {
      var p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || pts[i + 1];
      var c1x = p1.x + (p2.x - p0.x) / 6, c1y = p1.y + (p2.y - p0.y) / 6;
      var c2x = p2.x - (p3.x - p1.x) / 6, c2y = p2.y - (p3.y - p1.y) / 6;
      d += ' C' + c1x.toFixed(2) + ' ' + c1y.toFixed(2) + ' ' + c2x.toFixed(2) + ' ' + c2y.toFixed(2) +
        ' ' + p2.x.toFixed(2) + ' ' + p2.y.toFixed(2);
    }
    return d;
  }

  /* arcLenAtPoint — the arc length along the path nearest a given point (smoothing-agnostic), so the
     earned gold sub-path ends exactly at the last done node's centre. */
  function arcLenAtPoint(pathEl, total, pt) {
    var best = 0, bestD = Infinity, N = Math.max(48, Math.min(600, Math.floor(total / 4)));
    for (var i = 0; i <= N; i++) {
      var l = total * i / N, p = pathEl.getPointAtLength(l);
      var dx = p.x - pt.x, dy = p.y - pt.y, dd = dx * dx + dy * dy;
      if (dd < bestD) { bestD = dd; best = l; }
    }
    return best;
  }

  /* drawThreads — recompute each section's thread from node-mark centres AFTER layout. The base is a
     faint navy line through all centres; the earned portion (through the last `done` node) re-inks
     gold via the shipped .thread, drawn to its final extent and STATIC (law 9 — no ink-draw replay;
     the draw verb belongs to lesson-complete on the reward page, never a home visit). */
  function drawThreads() {
    if (!app) return;
    app.querySelectorAll('.opath').forEach(function (sec) {
      var svg = sec.querySelector('.op-thread-svg');
      if (!svg) return;
      var base = svg.querySelector('.op-thread-base'), gold = svg.querySelector('.op-thread');
      var marks = sec.querySelectorAll('.onode-mark');
      var pr = sec.getBoundingClientRect();
      svg.setAttribute('viewBox', '0 0 ' + (pr.width || 1) + ' ' + (pr.height || 1));
      if (!pr.width || marks.length < 2) {
        if (base) base.removeAttribute('d');
        if (gold) { gold.removeAttribute('d'); gold.style.display = 'none'; }
        return;
      }
      var pts = [], lastEarned = -1;
      marks.forEach(function (m, i) {
        var r = m.getBoundingClientRect();
        pts.push({ x: r.left + r.width / 2 - pr.left, y: r.top + r.height / 2 - pr.top });
        var btn = m.closest('.onode');
        if (btn && btn.getAttribute('data-nstate') === 'done') lastEarned = i;
      });
      var d = smoothPath(pts);
      base.setAttribute('d', d);
      gold.setAttribute('d', d);
      if (lastEarned < 1) { gold.style.display = 'none'; return; }   // nothing earned within this section yet
      gold.style.display = '';
      var total = gold.getTotalLength();
      var earnedLen = arcLenAtPoint(gold, total, pts[lastEarned]);
      gold.style.setProperty('--len', earnedLen);                    // parity with the shipped .thread contract
      gold.style.strokeDasharray = earnedLen + ' ' + (total + 1);    // reveal only the earned road
      gold.style.strokeDashoffset = '0';                             // STATIC to its final extent (no replay)
    });
  }

  function scheduleDraw() {
    if (scheduleDraw._q) return;
    var raf = window.requestAnimationFrame || function (f) { return setTimeout(f, 16); };
    scheduleDraw._q = raf(function () { scheduleDraw._q = 0; drawThreads(); });
  }

  /* recompute on load + resize + a ResizeObserver so the winding line follows the nodes 320→desktop
     and after fonts settle. Attached once; the observed #app persists across re-renders. */
  function setupObservers() {
    if (observing) return; observing = true;
    window.addEventListener('resize', scheduleDraw);
    window.addEventListener('load', scheduleDraw);
    if (typeof ResizeObserver !== 'undefined') { new ResizeObserver(scheduleDraw).observe(app); }
  }

  /* D-61 auto-scroll — land on a validated #<node-id> if present, else the next available node. The
     hash is matched against idSet FIRST; only a known id reaches querySelector (never markup). */
  function autoScroll() {
    var target = null;
    var raw = (location.hash || '').replace(/^#/, '');
    if (raw && Object.prototype.hasOwnProperty.call(idSet, raw)) {
      target = app.querySelector('.onode[data-id="' + raw + '"]');   // raw ∈ known id set (validated)
    }
    if (!target && curActiveId) target = app.querySelector('.onode[data-id="' + curActiveId + '"]');
    if (target && target.scrollIntoView) target.scrollIntoView({ block: 'center' });
  }

  /* -- The node popup (§S4 · LRN-03 / D-55 / R-4) — a singleton cream slip of paper. It is a PAGE
     object mounted on document.body (mirroring AW.sheet), NEVER inside .reg-orbit, so its CTA
     resolves to the default Page-crimson .btn rather than the invisible .reg-orbit cream-on-cream
     key (Pitfall 3). Anchored to the tapped station via getBoundingClientRect with edge-clamping +
     an arrow offset (--ax); singleton (opening one closes any other); outside-tap + Esc close. */
  var openPop = null, popNode = null, popWired = false, popUntrap = null;
  var stCur = null, stByIdCur = {};   /* the live snapshot + id→state, refreshed each render (popup reads them) */

  function closePop() {
    if (popUntrap) { popUntrap(); popUntrap = null; }   /* dispose the shared containment trap first (D-63) */
    if (openPop) { openPop.remove(); openPop = null; }
    if (popNode) {
      popNode.setAttribute('aria-expanded', 'false');
      var trigger = popNode;
      popNode = null;
      /* return focus to the station that opened the slip — but ONLY when it is still connected. In the
         render() detach path the node is being rebuilt, so skip (render's own flow re-lands focus). */
      if (trigger.isConnected) trigger.focus();
    }
  }

  function placePop(pop, node) {
    var r = node.getBoundingClientRect();
    var nx = r.left + r.width / 2;                       /* station centre (scroll-aware — fixed positioning) */
    var half = (pop.offsetWidth / 2) || 120;
    var m = 6;                                           /* viewport-edge breathing */
    var cx = Math.max(half + m, Math.min(window.innerWidth - half - m, nx));
    pop.style.left = (cx - half) + 'px';                 /* the LEFT edge (no transform — settle owns transform) */
    pop.style.setProperty('--ax', (nx - cx) + 'px');     /* arrow offset: still points at the station when clamped */
    var gap = 10, ph = pop.offsetHeight;
    if (window.innerHeight - r.bottom >= ph + gap || r.top < ph + gap) {
      pop.dataset.side = 'below';                        /* room below (or too tight above) → slip under the node */
      pop.style.top = (r.bottom + gap) + 'px';
    } else {
      pop.dataset.side = 'above';
      pop.style.top = Math.max(m, r.top - ph - gap) + 'px';
    }
  }

  function openPopFor(node) {
    var reopen = (node === popNode);
    closePop();                                          /* singleton — any open slip closes first */
    if (reopen) return;                                  /* a second tap on the same station just closes it */
    var pop = document.createElement('div');
    pop.className = 'npop';
    pop.setAttribute('role', 'dialog');
    pop.setAttribute('aria-modal', 'true');              /* D-63 — the dialog contract; the trap below closes the reachable background (Pitfall 8) */
    pop.innerHTML = popContent(node);
    document.body.appendChild(pop);                      /* MOUNT ON BODY (R-4 / Pitfall 3) — never in .reg-orbit */
    /* name the dialog from its own heading (aria-labelledby → the .np-label, given an id here — the
       slip is a singleton so a fixed id is unique) and make the plain div dialog focusable. */
    var lbl = pop.querySelector('.np-label');
    if (lbl) { if (!lbl.id) lbl.id = 'npLabel'; pop.setAttribute('aria-labelledby', lbl.id); }
    pop.tabIndex = -1;                                   /* a plain div ignores .focus() without this (S4) */
    node.setAttribute('aria-expanded', 'true');
    openPop = pop; popNode = node;
    wireCta(pop, node);                                  /* CTA nav + morph + chest-claim wiring (below) */
    placePop(pop, node);                                 /* measure + anchor AFTER contents are in the DOM */
    /* move focus onto the dialog itself — a locked slip has NO CTA (D-54), so the dialog is the focus
       target — then contain Tab within it via the ONE shared helper (disposed in closePop). */
    pop.focus();
    popUntrap = AW._trapFocus(pop);
  }

  /* nodeAtomCount(id) — the station's taught-atom count for its seed-row, WITHOUT exposing the
     engine-private NODE_ATOMS map: a single-star probe through the pure AW.atomsDone returns
     NODE_ATOMS[id]||0 (reviews/chests are absent from the map → 0 dots → no seed-row). */
  function nodeAtomCount(id) {
    var s = {}; s[id] = 1;
    return AW.atomsDone({ stars: s });
  }

  /* popContent(node) — the slip's contents per the station's live-derived state (§S4 + copy table):
     label · subtitle/microcopy · star row (done) · seed-row · CTA. Locked = the gentle "not yet",
     NO CTA (D-54). Chest = the gift copy (claim hook stubbed for 05-05). */
  function popContent(node) {
    var id = node.getAttribute('data-id');
    var kind = node.getAttribute('data-kind');
    var state = node.getAttribute('data-nstate');
    var nd = byId[id] || {};
    var href = nd.href || '';

    /* seed-row (R-2 BINARY-done): faint --madder at rest, all inked together iff the station is done;
       never a live partial (Pitfall 5). Lessons carry atoms; reviews/chests resolve to 0. */
    var n = nodeAtomCount(id), seeds = '';
    if (n > 0) {
      var inked = (state === 'done') ? ' is-inked' : '', dots = '';
      for (var i = 0; i < n; i++) dots += '<span class="np-seed' + inked + '"></span>';
      seeds = '<div class="np-seeds" aria-hidden="true">' + dots + '</div>';
    }

    /* star row (done lesson/review) — 1..3 earned gold, the rest hollowed muted */
    var stars = '';
    if (state === 'done' && kind !== 'chest') {
      var sN = (stCur && stCur.stars && stCur.stars[id]) || 0, sH = '';
      for (var k = 0; k < 3; k++) sH += '<span class="np-star' + (k < sN ? ' is-earned' : '') + '">' + AW.icon('star') + '</span>';
      stars = '<div class="np-stars">' + sH + '</div>';
    }

    var head = '<div class="np-label">' + (nd.label || '') + '</div>';
    var sub = '', cta = '';

    if (state === 'locked') {
      /* the gentle "not yet" (D-54) — quiet microcopy, NO CTA, never a buzzer/shake/red */
      sub = '<div class="np-sub np-locked">Not yet — finish what comes before.</div>';
    } else if (kind === 'chest') {
      head = '<div class="np-label">A gift of light</div>';
      if (state === 'available') {
        sub = '<div class="np-sub">+25 noor, for finishing the unit. It is yours to keep.</div>';
        cta = '<button class="btn np-cta" type="button" data-claim="' + id + '">Open the gift</button>';
      } else {
        sub = '<div class="np-sub">Already opened. The light stayed with you.</div>';
      }
    } else if (kind === 'review') {
      if (state === 'done') {
        cta = '<a class="btn np-cta" href="' + href + '" data-morph>LEGENDARY AGAIN</a>';
      } else {
        sub = '<div class="np-sub">A gold, timed mastery run. Nothing can be lost.</div>';
        cta = '<a class="btn np-cta" href="' + href + '" data-morph>START</a>';
      }
    } else {
      if (state === 'done') {
        cta = '<a class="btn np-cta" href="' + href + '" data-morph>REVIEW · improve your stars</a>';
      } else {
        sub = '<div class="np-sub">5–8 minutes · not yet begun</div>';
        cta = '<a class="btn np-cta" href="' + href + '" data-morph>START · earn noor</a>';
      }
    }
    return head + sub + stars + seeds + cta;
  }

  /* wireCta(pop, node) — the CTA behaviour. A lesson/review CTA hands the station's square to the
     shared engine as the morph source at click time, then lets its <a href> navigate (05-04 Task 3
     guards + stamps + tweens it). A chest CTA calls the 05-05 Festival claim hook if present (a
     no-op stub until then) and closes the slip; the claim is never randomized. */
  function wireCta(pop, node) {
    var cta = pop.querySelector('.np-cta');
    if (!cta) return;
    if (cta.hasAttribute('data-claim')) {
      cta.addEventListener('click', function () {
        var cid = cta.getAttribute('data-claim');
        if (typeof window.__awbaClaimChest === 'function') window.__awbaClaimChest(cid);
        closePop();
      });
    } else if (cta.hasAttribute('data-morph')) {
      cta.addEventListener('click', function () {
        window.__awbaMorphEl = node.querySelector('.onode-mark') || null;   // ONE source; scripture never chosen
      });
    }
  }

  function setupPopup() {
    if (popWired) return; popWired = true;
    /* tap a station → its popup (delegated on the persistent #app; stopPropagation keeps THIS click
       from also reaching the outside-tap closer below). */
    app.addEventListener('click', function (e) {
      var node = e.target.closest && e.target.closest('.onode');
      if (node && app.contains(node)) { e.stopPropagation(); openPopFor(node); }
    });
    /* outside-tap closes — a document listener that ignores taps on the slip or on a station */
    document.addEventListener('click', function (e) {
      if (!openPop) return;
      if (e.target.closest && (e.target.closest('.npop') || e.target.closest('.onode'))) return;
      closePop();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && openPop) closePop();
    });
    /* re-anchor an open slip when the world shifts under it (resize / font settle) */
    window.addEventListener('resize', function () { if (openPop && popNode) placePop(openPop, popNode); });
  }

  /* ============================================================================================
     The ONE shared sheet family (§S4 · D-60 / LRN-06) — streak / noor / course-switcher, each a
     SINGLE AW.sheet(html) call on the shipped singleton (append-to-body, outside-tap + Esc close,
     scroll-lock — all shipped). No bespoke sheet DOM: the streak sheet is ONE implementation opened
     from the HUD returns stat, the streak strip AND the Returns tab; the noor sheet from the HUD noor
     stat; the switcher from the course chip. Reads via AW.state() only; copy ports VERBATIM from
     Gen-3 _MVP-BUILD/learn.html (never edited — 'thread'/'break' live inside authored strings only).
     ============================================================================================ */

  /* the streak + noor stat sheets — HOISTED to the engine as AW.streakSheet()/AW.noorSheet() (Wave-A
     seam S3 / D-60: exactly ONE implementation). Wave-C adopts them: the page-private inline builders
     are gone and the HUD / streak-strip / Returns-tab wiring below calls AW.streakSheet / AW.noorSheet
     directly, so the .osh-* markup + copy live in one place (awba-engine.js). No storage word enters
     this page; the zero-storage count stays 0. */

  /* the course switcher — Aqeedah ACTIVE (an olive "sound/verified" pill) + Fiqh/Seerah/Qur'an as
     polished COMING SOON rows (a calm neutral pill on a --rule hairline; never disabled-dead grey).
     Each row rides the shipped .sheet-row press; .off carries the coming-soon state. Copy VERBATIM. */
  function openSwitcher() {
    function row(off, scene, name, pill, on) {
      return '<div class="sheet-row osw-row' + (off ? ' off' : '') + '">' +
        '<span class="osw-ic">' + AW.icon(scene, { size: '24px' }) + '</span>' +
        '<span class="osw-name">' + name + '</span>' +
        '<span class="osw-pill' + (on ? ' on' : '') + '">' + pill + '</span>' +
      '</div>';
    }
    AW.sheet(
      '<div class="grip"></div>' +
      row(false, 'lantern', 'Aqeedah · Level 1', 'ACTIVE', true) +
      row(true, 'open', 'Fiqh · Level 1', 'COMING SOON', false) +
      row(true, 'crescent', 'Seerah', 'COMING SOON', false) +
      row(true, 'cite', 'Qur’an', 'COMING SOON', false),
      'Switch course');                  /* D-63/R-10 — a natural accessible name for the sheet */
  }

  /* (The Practice / Profile / More coming-soon sheet was removed in the §E.2 Wave-C rewire — those
     three tabs are now real <a href> navigation. The course-switcher's COMING SOON rows above are a
     separate feature and stay untouched.) */

  /* ============================================================================================
     S5 · the chest claim (+25 once, idempotent) + the Festival circuit-plate interstitial
     (RWD-04 / D-56). The mechanic is BYTE-PRESERVED from Gen-3: the chest is available when its
     unit's review has stars; claiming grants +25 noor EXACTLY ONCE via a write-once guard on the
     `chests` slot in AW.S (Gen-3 awba_chest_* keys already migrate) — deterministic, NEVER
     randomized, a sure gift (the popup already said "+25 noor"). The claim IS the sanctioned
     Festival threshold: a SEPARATE overlay ground (the learn screen beneath stays Orbit, law 1).
     ============================================================================================ */

  function fmtDate(d) {   /* a private, local (D-16 — never toISOString), Courier-friendly date */
    var mon = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return d.getDate() + ' ' + mon[d.getMonth()] + ' ' + d.getFullYear();
  }

  /* festivalHtml — the interstitial composition: a small Ring with a CIRCLE crowd-arrival of ink
     .dab drift-settling around it (shipped .rv-ringdabs/drift, staggered animation-delay), that
     circuit's gold thread arc closing (the shipped .thread / ink-draw over stroke-dashoffset), and
     the dated folk .plate that stamps in (shipped .plate/stamp; its title may use Rakkas — valid
     ONLY inside this Festival threshold). The plate is private, maker's-marked with date + ring
     seed in Courier. No new keyframe — every verb is a shipped one. */
  function festivalHtml(circuitN, dateStr, seed) {
    var dabs = '';
    for (var i = 0; i < 6; i++) dabs += '<span class="dab" style="animation-delay:' + (i * 40) + 'ms"></span>';
    var mark = 'Circuit ' + (circuitN || '') + ' · ' + dateStr + ' · ' + seed.toString(36);
    return '<div class="ofest-inner">' +
        '<div class="ofest-ring">' +
          '<svg class="ofest-arc" viewBox="0 0 108 108" aria-hidden="true" focusable="false">' +
            '<circle class="ofest-arc-base" cx="54" cy="54" r="46"></circle>' +
            /* the closing gold thread arc — --len/dasharray ≥ the r=46 circumference (~289) so the
               shipped ink-draw sweeps it from hidden → fully drawn (closed); static under reduce. */
            '<path class="thread ofest-thread" style="--len:290;stroke-dasharray:290" d="M54 8 A46 46 0 1 1 53.6 8"></path>' +
          '</svg>' +
          '<div class="rv-ringdabs">' + dabs + '</div>' +
          '<span class="ofest-glyph">' + AW.icon('spark', { size: '30px' }) + '</span>' +
        '</div>' +
        '<div class="plate ofest-plate">' +
          '<div class="ofest-plate-title">A gift of light</div>' +
          '<div class="ofest-mark">' + mark + '</div>' +
        '</div>' +
        '<div class="ofest-noor">+25 noor · yours to keep</div>' +
        '<button class="btn ofest-close" type="button">Keep the light</button>' +
      '</div>';
  }

  function closeFestival(overlay, esc, nodeId) {
    if (overlay.__festUntrap) { overlay.__festUntrap(); overlay.__festUntrap = null; }   /* dispose the shared trap (D-63) */
    document.removeEventListener('keydown', esc);
    document.documentElement.classList.remove('sheet-lock');
    render();                              /* refresh the path FIRST (the chest node now reads done) —
                                              revealed as the overlay fades out over it */
    overlay.classList.remove('open');
    var done = false;
    function fin() { if (done) return; done = true; if (overlay.parentNode) overlay.remove(); }
    overlay.addEventListener('transitionend', fin);
    setTimeout(fin, 500);                  /* fallback when no transition fires (reduced motion) */
    /* focus-return-after-render (Pitfall 6): the CTA that opened this lived in the now-removed popup and
       render() just rebuilt the path, so re-query the chest node by data-id AFTER render() and land
       focus on it — never dump the keyboard user at <body>. */
    if (nodeId) {
      var chestNode = app.querySelector('.onode[data-id="' + nodeId + '"]');
      if (chestNode && chestNode.focus) chestNode.focus();
    }
  }

  /* openFestival — append the .reg-festival threshold OVERLAY to document.body (never inside
     .reg-orbit; the learn screen stays Orbit, law 1). Dismiss (button / backdrop / Esc) → re-render
     the path. All motion is the shipped stamp/drift/ink-draw, self-quieted under reduced motion; the
     +25 noor was already granted before this ran (the mechanic never depends on motion). */
  function openFestival(nodeId) {
    var m = metaById[nodeId] || {};
    var overlay = document.createElement('div');
    overlay.className = 'ofest reg-festival';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-label', 'A gift of light');
    overlay.innerHTML = festivalHtml(m.un, fmtDate(new Date()), AW.ringSeed());
    document.body.appendChild(overlay);
    document.documentElement.classList.add('sheet-lock');
    function esc(e) { if (e.key === 'Escape') closeFestival(overlay, esc, nodeId); }
    document.addEventListener('keydown', esc);
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay || (e.target.closest && e.target.closest('.ofest-close'))) closeFestival(overlay, esc, nodeId);
    });
    var raf = window.requestAnimationFrame || function (f) { return setTimeout(f, 16); };
    raf(function () { overlay.classList.add('open'); });   /* a quiet threshold fade-in */
    var btn = overlay.querySelector('.ofest-close');
    if (btn && btn.focus) btn.focus();
    /* contain Tab within the threshold via the ONE shared helper — the only focusable is .ofest-close,
       so the cycle is a self-loop (Tab keeps you on "Keep the light"); disposed in closeFestival. */
    overlay.__festUntrap = AW._trapFocus(overlay);
  }

  /* window.__awbaClaimChest(nodeId) — the hook the 05-04 popup CTA calls. The write-once guard makes
     the +25 noor EXACTLY ONCE and idempotent (a second claim is a no-op — never doubles); the reward
     is a fixed +25, NEVER randomized. Rule-2 hardening: only a real, earned (available), unopened
     chest ever claims (the popup already gates the CTA to available chests; this is defence-in-depth
     so a stray call can never credit a locked/non-chest id). */
  window.__awbaClaimChest = function (nodeId) {
    var nd = byId[nodeId];
    if (!nd || !nd.chest) return;                       // only real chest nodes
    var st = AW.state();
    var chests = st.chests;                              // AW.S.get returns a defensive clone (or the stored value as-is)
    if (!chests || typeof chests !== 'object') chests = {};   // WR-01 — a corrupted/null/non-object chests blob → {}, never index a bad read
    if (chests[nodeId]) return;                          // write-once — a second claim is a NO-OP
    var states = AW.deriveNodeState(flat, st), derived = null;
    for (var i = 0; i < states.length; i++) { if (states[i].id === nodeId) { derived = states[i].state; break; } }
    if (derived !== 'available') return;                 // not yet earned → no-op (never claim early)
    chests[nodeId] = true;
    AW.S.set('chests', chests);
    AW.S.set('noor', AW.S.get('noor', 0) + 25);          // +25 EXACTLY ONCE, deterministic — NEVER randomized
    openFestival(nodeId);                                // the Festival threshold; learn screen stays Orbit
  };

  function render() {
    closePop();                                  // an app.innerHTML rebuild detaches node buttons — drop any open slip
    var st = AW.state();
    var states = AW.deriveNodeState(flat, st);   // [{id,state}] — the shipped Gen-3 reveal rules (extend, don't fork)
    var stById = {};
    states.forEach(function (s) { stById[s.id] = s.state; });
    stCur = st; stByIdCur = stById;              // hand the live snapshot to the popup content builder
    var activeIdx = -1;
    for (var i = 0; i < states.length; i++) {
      if (states[i].state === 'active') { activeIdx = i; break; }
    }
    var activeUnit = activeIdx >= 0 ? meta[activeIdx].un : (meta.length ? meta[meta.length - 1].un : 1);
    curActiveId = activeIdx >= 0 ? flat[activeIdx].id : (flat.length ? flat[flat.length - 1].id : null);

    /* HUD marginalia (D-60) — a transparent .ls-hud row: LEFT a course chip (mini cream Farag-square
       island holding the active-course scene icon); RIGHT cluster the returns .hstat (flame + count),
       the noor .hstat (spark + count), and the shared 44px mute toggle. No pill fills. The chip /
       returns / noor taps open their sheets in 05-05 — rendered here as marginalia, no faked sheet. */
    var courseIcon = AW.UNIT_ICON['u' + activeUnit] || 'compass';
    var hud =
      '<div class="ls-hud">' +
        '<button class="oh-chip" id="courseChip" type="button" aria-label="Switch course">' +
          '<span class="oh-chip-sq">' + AW.icon(courseIcon, { size: '22px' }) + '</span>' +
        '</button>' +
        '<span class="ls-stats">' +
          '<button class="hstat" id="hudReturns" type="button" aria-label="' + st.returns + ' returns — open your streak">' + AW.icon('flame') + '<span>' + st.returns + '</span></button>' +
          '<button class="hstat" id="hudNoor" type="button" aria-label="' + st.noor + ' noor — open your light">' + AW.icon('spark') + '<span>' + st.noor + '</span></button>' +
          AW.muteBtnHtml() +
        '</span>' +
      '</div>';

    /* Ring hero (THE macro map, STATIC on load — law 9): omit animateFrom so the established ring
       renders fully static (the draw belongs to lesson-complete only, never a home-visit replay).
       It is the only element at this scale; nothing below competes (no second ring, no progress bar). */
    var ring =
      '<div class="ob-ring"><div class="ob-ringcap">' +
        AW.ringSVG({ atomsDone: AW.atomsDone(AW.state()), size: 300 }) +
      '</div></div>';

    /* Streak strip + constellation (re-voiced from the Gen-3 band, D-60) — a quiet Courier line
       directly under the Ring + a row of return-day dots from AW.weekCal(): on = lit gold, off =
       un-lit powder-family ink. Never a gap / red / miss (RWD-02 mercy). */
    var wk = AW.weekCal();
    var dots = '';
    wk.forEach(function (d) { dots += '<span class="day' + (d.on ? ' here' : '') + '"></span>'; });
    var streak =
      '<button class="ob-streak" id="streakStrip" type="button" aria-label="' + st.returns + ' returns — open your streak">' +
        '<div class="ss-line">' + st.returns + ' returns · your streak never breaks</div>' +
        '<div class="weekcal ss-const">' + dots + '</div>' +
      '</button>';

    /* Continue card (one navy panel pointing at the next available node, D-53) — cream text on navy
       (≥13:1), light-edge depth (never a drop shadow on dark). Courier kicker "Continue";
       "Circuit {n} · {chapter-term}" where the chapter-term is the English unit title in a cream
       Farag square (R-6 — Arabic terms are owner-sourced, never invented); the next node's label;
       a gold-ghost .btn "Continue the path" navigating to the active node's href. Course complete
       (no active lesson) → a quiet Courier line, no celebration primitive here (that is Festival's). */
    var cont;
    if (activeIdx >= 0) {
      var an = flat[activeIdx], am = meta[activeIdx];
      cont =
        '<div class="cc">' +
          '<div class="cc-kick">Continue</div>' +
          '<div class="cc-circuit">Circuit ' + am.un + ' · <span class="cc-term">' + am.ut + '</span></div>' +
          '<div class="cc-next">' + an.label + '</div>' +
          '<a class="btn ghost cc-go" href="' + an.href + '">Continue the path</a>' +
        '</div>';
    } else {
      cont =
        '<div class="cc">' +
          '<div class="cc-kick">Continue</div>' +
          '<div class="cc-done">You\'ve walked the whole path</div>' +
        '</div>';
    }

    /* Daily ayah (S2 / D-59) — the ONLY scripture on the screen; it takes the reverence budget while
       everything else stays marginalia-quiet. Rotation is day-of-year via AW.dailyIndex (the Gen-3
       getDate() monthly-repeat bug is retired). Rendered under scripture law: Amiri Quran (.ayah),
       lang=ar dir=rtl, strongest cream ink + the one permitted glow, translation + source + the calm
       pending pill; nothing celebratory in or beside it; it never morphs across pages (D-58). */
    var ayahV = DAILY[AW.dailyIndex(new Date(), DAILY.length)];
    /* R-9: the card KEEPS its <section> (drops role=button/tabindex so the sacred .ayah keeps its
       isolated scripture SR reading, law 3) and gains a native inner <button class="oayah-cite"> that
       owns the keyboard/SR entry to the citation sheet; a pointer-only convenience click on the rest
       of the card delegates to it (wired below). */
    var ayah =
      '<section class="oayah" id="ayahHost">' +
        '<div class="oa-kick">' + AW.icon('spark') + '<span>A little light for today · ' + ayahV.ref + '</span></div>' +
        '<div class="ayah" lang="ar" dir="rtl">' + ayahV.ar + '</div>' +
        '<div class="oa-trans">' + ayahV.tr + '</div>' +
        '<div class="oa-src">The Clear Quran · Dr. Mustafa Khattab · pending review</div>' +
        '<div class="oa-pill">unverified · pending review</div>' +
        '<button class="oayah-cite" type="button">Read the citation</button>' +
      '</section>';

    /* Unit headers + the winding-journey scaffold (S3 / D-53) — one cream-Farag-square-fronted card
       per unit: the scene icon (AW.UNIT_ICON, gold --icon-accent on the dark card) + the chapter-term
       in a cream Farag square (the English unit title — R-6: Arabic terms are owner-sourced, never
       invented; the mechanism is Aref-Ruqaa, the string is the English fallback in Readex) + the desc
       (--paper-62). NO unit colour-coding, NO "SECTION n" eyebrow (both retired at Gate 2). Each header
       precedes its unit's .opath node section (the nodes + SVG thread are laid in later passes). */
    /* Each node's data-state is derived LIVE from the shipped AW.deriveNodeState (consumed above,
       never forked); the visual is the SHIPPED thermal/celebration grammar mapped by kind + state:
         · lesson locked   → hollow powder ring + lock glyph (no breathe)
         · lesson active    → ember half-dab + the ONLY path breathe (a data-ambient the shipped
                              reduced-motion block stills)
         · lesson done      → filled gold dab + check + the Courier star count + one sprout (R-3)
         · review (any)     → gold rosette: a filled .rosette seal when done, a rosette FRAME +
                              trophy when not-yet (never crimson — banned on Orbit)
         · chest node       → the plate-framed gift node (folk keyline + chest glyph + label; the
                              Gen-3 treasure-box art stays retired)
       Nodes are real <button>s (keyboard-focusable, getBoundingClientRect-anchorable for 05-04's
       popup); they lie on a serpentine (a per-node --lane), NOT alternating Duolingo circles. Tap
       handling (the popup) is 05-04 — this pass renders the true storage-derived states. */
    function nodeHtml(nd, idx) {
      var state = stById[nd.id] || 'locked';
      var kind = nd.chest ? 'chest' : (nd.review ? 'review' : 'lesson');
      var mark;
      if (kind === 'lesson') {
        if (state === 'done') {
          mark = '<span class="onode-mark" data-state="mastered">' + AW.icon('check') + '</span>';
        } else if (state === 'active') {
          mark = '<span class="onode-mark" data-state="progress" data-ambient></span>';
        } else {
          mark = '<span class="onode-mark onode-locked" data-state="not-yet">' + AW.icon('lock') + '</span>';
        }
      } else if (kind === 'review') {
        mark = (state === 'done')
          ? '<span class="onode-mark rosette op-static">' + AW.icon('check') + '</span>'
          : '<span class="onode-mark op-rosette">' + AW.icon('trophy') + '</span>';
      } else {
        mark = '<span class="onode-mark op-plate op-plate-' + state + '">' + AW.icon('chest') + '</span>';
      }
      var meta = '';
      if (state === 'done' && kind !== 'chest') {
        var starsN = st.stars[nd.id] || 0, stars = '';
        for (var s = 0; s < starsN; s++) stars += AW.icon('star');
        meta = '<span class="onode-stars">' + stars + '</span>';
        if (kind === 'lesson') meta += '<span class="onode-sprout">' + AW.sproutFor(nd.id) + '</span>';
      }
      /* state-in-name (D-64 / ACC-02) — compose the accessible name "{label}, {state phrase}" from the
         shipped data-kind + data-nstate per the UI-SPEC node state-phrase table, so a blind learner
         hears each station's status without a visual cue. No new state source — the STATE.md Pending
         Todo (path-node accessible names) closes here. */
      var statePhrase;
      if (kind === 'chest') {
        statePhrase = (state === 'available') ? 'ready to open' : (state === 'done' ? 'opened' : 'locked');
      } else if (state === 'done') {
        statePhrase = 'complete, ' + (st.stars[nd.id] || 0) + ' of 3 stars';
      } else {
        statePhrase = (state === 'active') ? 'available' : 'locked';
      }
      var ariaLabel = nd.label + ', ' + statePhrase;
      /* a gentle off-centre serpentine (the thread smooths it into a hand-inked walk); one long
         wave across the whole journey via the flat index, never a symmetric left/right zigzag. */
      var lane = 0.5 + 0.34 * Math.sin(idx * 1.15 + 0.5);
      return '<div class="onode-row" style="--lane:' + lane.toFixed(3) + '">' +
        '<button class="onode" type="button" data-id="' + nd.id + '" data-idx="' + idx + '"' +
          ' data-kind="' + kind + '" data-nstate="' + state + '" aria-label="' + ariaLabel + '" aria-expanded="false">' +
          mark +
          '<span class="onode-label">' + nd.label + '</span>' +
          (meta ? '<span class="onode-meta">' + meta + '</span>' : '') +
        '</button>' +
      '</div>';
    }

    var journey = '', fi = 0;
    UNITS.forEach(function (u) {
      var uicon = AW.UNIT_ICON['u' + u.n] || 'compass';
      var rows = '';
      u.nodes.forEach(function (nd) { rows += nodeHtml(nd, fi); fi++; });
      journey +=
        '<section class="ounit">' +
          '<div class="ounit-head">' +
            '<span class="ounit-ic">' + AW.icon(uicon, { size: '34px' }) + '</span>' +
            '<span class="ounit-term">' + u.title + '</span>' +
            '<p class="ounit-desc">' + u.desc + '</p>' +
          '</div>' +
          '<div class="opath">' +
            /* one continuous ink thread per section: a faint navy base through every node centre +
               the earned gold sub-path (the shipped .thread, made STATIC on load — law 9). The `d`
               is computed from node-mark centres after layout (drawThreads on load + resize). */
            '<svg class="op-thread-svg" aria-hidden="true" focusable="false" preserveAspectRatio="none">' +
              '<path class="op-thread-base"></path>' +
              '<path class="thread op-thread"></path>' +
            '</svg>' +
            rows +
          '</div>' +
        '</section>';
    });
    var journeyWrap = '<div class="ojourney">' + journey + '</div>';

    /* Ibrahim 14:24 epigraph (S3 / R-7) — a quiet Courier marginalia line beneath the path (the
       orchard's reason for existing), NOT a second Amiri scripture panel. R-7 SPLICE LANDED 2026-07-16
       on the owner's explicit fetch authorization: the verse line below is the Clear Quran
       (Dr. Mustafa Khattab) rendering of 14:24, fetched verbatim and TRIPLE-CROSS-VERIFIED
       (quranapi.pages.dev api/14/24 · the-quran-project mirror eng-mustafakhattaba · quran.com/14/24
       rendered page — words byte-identical across all three; the trailing comma follows quran.com,
       the translation's official digital home; variance logged in CONTENT-DECISIONS G1 addendum for
       the scholar). NEVER edit this string by hand — it is pinned by SHA in scripts/port-audit.mjs;
       the "translation pending review" marker stays until scholar sign-off. Nothing celebratory
       adjacent; never a VT name. */
    var ibrahim =
      '<div class="oibrahim">' +
        '<p class="oib-line">Do you not see how Allah compares a good word to a good tree? Its root is firm and its branches reach the sky,</p>' +
        '<p class="oib-ref">Ibrāhīm 14:24 · The Clear Quran · translation pending review</p>' +
      '</div>';

    /* Composition body (top→bottom): Ring hero → streak strip + constellation → continue card →
       daily ayah → the winding journey (4 unit sections) → the Ibrahim 14:24 epigraph. */
    var body = '<div class="ob-hero">' + ring + streak + '</div>' + cont + ayah + journeyWrap + ibrahim;

    /* Tab bar (§S4 · R-5 · LRN-07) — Learn active with the GOLD active cue on Orbit (crimson is
       2.65:1 on Kiswah — banned; the @layer screens .reg-orbit .tab.active override re-inks it gold,
       mirroring the shipped .rv-shell precedent). Every inactive tab opens a designed AW.sheet —
       never a dead tap; Returns → the ONE streak sheet (Task 1's implementation). Fixed to the bottom
       edge (a direct child of #app so no animated/transformed ancestor breaks position:fixed), 44px
       min per tab, safe-area inset bottom. */
    function tab(id, active, scene, label, href) {
      // inactive tabs with a destination are real <a href> links (§E.2 — file://-safe, the shipped
      // cross-document morph rides free); Learn (active, scroll-to-top) and Returns (streak sheet)
      // stay <button> exactly as shipped.
      if (href && !active) {
        return '<a class="tab" id="' + id + '" href="' + href + '">' +
          '<span class="otab-ic">' + AW.icon(scene) + '</span>' + label + '</a>';
      }
      return '<button class="tab' + (active ? ' active' : '') + '" type="button" id="' + id + '"' +
        (active ? ' aria-current="page"' : '') + '>' +
        '<span class="otab-ic">' + AW.icon(scene) + '</span>' + label + '</button>';
    }
    var tabs =
      '<nav class="otabs" aria-label="Sections">' +
        tab('tabLearn', true, 'lamp', 'Learn') +
        tab('tabPractice', false, 'beads', 'Practice', 'practice.html') +
        tab('tabReturns', false, 'flame', 'Returns') +
        tab('tabProfile', false, 'man', 'Profile', 'profile.html') +
        tab('tabMore', false, 'pattern', 'More', 'more.html') +
      '</nav>';

    app.innerHTML = '<div class="ob-shell">' + hud + '<div class="ob-wrap">' + body + '</div></div>' + tabs;

    /* the one shared mute pattern (D-60) — re-render on toggle so the glyph + aria swap */
    AW.bindMuteBtn(render);

    /* HUD + streak-strip taps come alive (§S4 · D-60 / LRN-01) — the course chip opens the switcher,
       the returns stat AND the whole streak strip open the ONE streak sheet, the noor stat opens the
       noor sheet. Re-wired each render (the HUD is rebuilt); the opener functions are the singletons. */
    var chip = document.getElementById('courseChip');
    if (chip) chip.addEventListener('click', openSwitcher);
    var hudReturns = document.getElementById('hudReturns');
    if (hudReturns) hudReturns.addEventListener('click', AW.streakSheet);
    var hudNoor = document.getElementById('hudNoor');
    if (hudNoor) hudNoor.addEventListener('click', AW.noorSheet);
    var streakStrip = document.getElementById('streakStrip');
    if (streakStrip) streakStrip.addEventListener('click', AW.streakSheet);

    /* Tab bar wiring (§E.2 · Wave-C rewire) — no dead taps. Learn is the active page (tap scrolls
       home); Practice/Profile/More are now REAL <a href> links (wired in the markup above, no JS);
       Returns opens the ONE streak sheet (the SAME S3 singleton — not a second sheet). */
    var tL = document.getElementById('tabLearn');
    if (tL) tL.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: AW.reducedMotion() ? 'auto' : 'smooth' });
    });
    var tR = document.getElementById('tabReturns');
    if (tR) tR.addEventListener('click', AW.streakSheet);

    /* the continue card carries the same morph (§S6): its chapter-term square is the source, handed
       to the shared engine at click time; the <a href> then navigates and the guarded stamp tweens it. */
    var ccGo = app.querySelector('.cc-go');
    if (ccGo) ccGo.addEventListener('click', function () {
      window.__awbaMorphEl = app.querySelector('.cc-term') || null;
    });

    /* the daily ayah taps open the shipped citation sheet (a Page cream object over the world). The
       DAILY verses are Qur'an → no grade → AW.sheetRef renders the .r-ar.ayah Amiri Quran face split
       and only the pending pill (no grade pill). */
    var ah = document.getElementById('ayahHost');
    if (ah) {
      var refs = {};
      refs[ayahV.ref] = { kind: 'The verse', ref: ayahV.ref, ar: ayahV.ar, mean: ayahV.tr,
        src: 'The Clear Quran · Dr. Mustafa Khattab · pending review' };
      var openCite = function () { AW.sheetRef(refs, ayahV.ref); };
      /* the native button owns keyboard/SR (R-9); stopPropagation keeps its own click from also
         firing the card's convenience handler (harmless — the sheet is a singleton — but clean). */
      var citeBtn = ah.querySelector('.oayah-cite');
      if (citeBtn) citeBtn.addEventListener('click', function (e) { e.stopPropagation(); openCite(); });
      /* a pointer-only convenience click on the rest of the card, delegating to the same opener; the
         button (not the section) is the operable, keyboard-reachable affordance. */
      ah.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('.oayah-cite')) return;
        openCite();
      });
    }

    /* Node entrance — a staggered one-pass settle per section (≤300ms total), then still. Reduced
       motion → no stagger (delays skipped) and the shipped --dur-settle collapse makes them appear
       in place. The only persistent path ambient is the single active-node breathe (data-ambient). */
    if (!AW.reducedMotion()) {
      app.querySelectorAll('.opath').forEach(function (sec) {
        sec.querySelectorAll('.onode').forEach(function (n, i) {
          n.style.animationDelay = Math.min(i * 45, 270) + 'ms';
        });
      });
    }

    /* Lay the ink threads from the freshly-rendered node centres, keep them following on resize, and
       (first load only) scroll the next available / validated-hash node into view (D-61). */
    drawThreads();
    setupObservers();
    setupPopup();
    if (!booted) { booted = true; autoScroll(); }
  }

  render();
})();
</script>
<script>
/* ============================================================================================
   The add-to-home nudge (D-72 / PLT-03) — a mercy-toned, dismissible invitation to keep Awba on the
   home screen. A separate classic controller (never a module — file:// review must survive): it
   captures Chromium's `beforeinstallprompt` (preventDefault + stash, then fire our own designed
   surface), and on iOS/iPadOS Safari — which never fires that event — shows a Share → Add to Home
   Screen hint instead. It is shown at most once per uninstalled state and NEVER nags: the dismissal,
   and the "already installed" state, are remembered THROUGH the engine (AW.prefs) — this page never
   touches the storage layer itself, so a new pref KEY reuses the engine's single storage call (no new
   storage literal here, no call added in the engine, no schema bump). The copy stays mercy-toned and
   carries none of the banned monetisation words; there is no celebration primitive and it never sits
   beside scripture.
   ============================================================================================ */
(function () {
  'use strict';
  if (!window.AW || !AW.prefs) return;                 // the engine owns storage; no engine, no nudge

  /* Already living on the home screen? The un-loseable promise is already kept — never nudge. */
  var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                    || navigator.standalone === true;
  if (standalone) return;

  /* Gently declined before? Remembered through AW.prefs — honor it, shown at most once per state. */
  var DISMISS_KEY = 'installNudgeDismissed';
  if (AW.prefs.get(DISMISS_KEY, false)) return;

  var deferred = null;    // Chromium's stashed beforeinstallprompt event
  var banner = null;
  var shown = false;

  function build(variant) {   // 'prompt' (Chromium, with an Add button) | 'ios' (Share hint, no button)
    var wrap = document.createElement('div');
    wrap.className = 'aw-nudge reg-orbit';                // reg-orbit → the gold ring + Orbit register ride in
    wrap.setAttribute('role', 'region');
    wrap.setAttribute('aria-label', 'Keep Awba on your home screen');
    var line = variant === 'ios'
      ? 'Tap Share, then Add to Home Screen, and your path is always here.'
      : 'Add it to your home screen, and your path is always here.';
    var addBtn = variant === 'prompt'
      ? '<button class="btn ghost awn-add" type="button">Add to home</button>'
      : '';
    wrap.innerHTML =
      '<div class="awn-card">' +
        '<span class="awn-ic" aria-hidden="true">' + AW.icon('lamp', { size: '26px' }) + '</span>' +
        '<div class="awn-copy">' +
          '<p class="awn-title">Keep Awba a tap away</p>' +
          '<p class="awn-line">' + line + '</p>' +
        '</div>' +
        '<div class="awn-acts">' +
          addBtn +
          '<button class="awn-dismiss" type="button">Not now</button>' +
        '</div>' +
      '</div>';
    return wrap;
  }

  function lift() {   // sit just above the fixed tab bar — measure it, never assume a height
    if (!banner) return;
    var tabs = document.querySelector('.otabs');
    var h = tabs ? Math.round(tabs.getBoundingClientRect().height) : 64;
    banner.style.setProperty('--awn-lift', h + 'px');
  }

  function dismiss() {
    if (!banner) return;
    AW.prefs.set(DISMISS_KEY, true);                     // remember through the engine — never re-nag
    var el = banner;
    banner = null;
    el.classList.remove('is-in');
    el.classList.add('is-out');
    var gone = false;
    function fin() { if (gone) return; gone = true; if (el.parentNode) el.parentNode.removeChild(el); }
    el.addEventListener('transitionend', fin);
    window.setTimeout(fin, 420);                         // guaranteed teardown if transitionend never lands
  }

  function reveal(variant) {
    if (shown) return;
    shown = true;
    banner = build(variant);
    document.body.appendChild(banner);
    lift();
    var raf = window.requestAnimationFrame || function (f) { return window.setTimeout(f, 16); };
    raf(function () { if (banner) banner.classList.add('is-in'); });   // the settle, next frame

    var add = banner.querySelector('.awn-add');
    if (add) add.addEventListener('click', function () {
      if (!deferred) { dismiss(); return; }
      var e = deferred; deferred = null;
      try { e.prompt(); } catch (err) {}                 // fire the stashed native prompt
      var choice = e.userChoice;                         // step aside either way — accepted or not, no nag
      if (choice && typeof choice.then === 'function') { choice.then(dismiss, dismiss); }
      else { dismiss(); }
    });
    var no = banner.querySelector('.awn-dismiss');
    if (no) no.addEventListener('click', dismiss);
    window.addEventListener('resize', lift);
    if (typeof AW.announce === 'function') {
      AW.announce('Keep Awba a tap away — add it to your home screen.');   // announced politely
    }
  }

  /* Chromium / Android: intercept the mini-infobar and present our own calm invitation instead. */
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    reveal('prompt');
  });

  /* Installed from anywhere → retire the nudge and remember it, so it never returns. */
  window.addEventListener('appinstalled', function () {
    AW.prefs.set(DISMISS_KEY, true);
    if (banner) dismiss();
  });

  /* iOS / iPadOS Safari never fires beforeinstallprompt. Detect it by FEATURE — navigator.standalone
     exists only on iOS Safari (no UA string parsing) — and, after a short window that lets a Chromium
     beforeinstallprompt win first, show the Share → Add to Home Screen hint. */
  if ('standalone' in navigator) {
    window.setTimeout(function () {
      if (!shown && !deferred) reveal('ios');
    }, 1200);
  }
})();
</script>
